<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FACE FITNESS</title>
<style>
:root{
  --bg:#070710;--panel:#0f0f1e;--panel2:#13132a;--border:#1a1a2e;
  --accent:#f472b6;--accent2:#818cf8;--accent3:#34d399;--accent4:#fbbf24;--danger:#f87171;
  --text:#e2e8f0;--dim:#475569;--glow:rgba(244,114,182,0.3);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;overflow-x:hidden;}

/* HEADER */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--panel);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;
}
.logo{font-size:1.2rem;font-weight:900;letter-spacing:4px;color:var(--accent);text-shadow:0 0 20px var(--glow);}
.logo span{color:var(--accent2);}
.header-nav{display:flex;gap:6px;}
.nav-btn{
  padding:6px 14px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--dim);font-size:0.72rem;cursor:pointer;
  letter-spacing:1px;transition:all .2s;
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent);}
.nav-btn.active{background:rgba(244,114,182,.15);border-color:var(--accent);color:var(--accent);}

/* SCREEN */
.screen{display:none;padding:20px 24px;max-width:1300px;margin:0 auto;}
.screen.active{display:block;}

/* CARDS */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:18px;}
.card-title{font-size:.65rem;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:12px;}

/* BUTTONS */
.btn{padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;letter-spacing:1px;transition:all .2s;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-primary:hover{filter:brightness(1.1);box-shadow:0 0 20px var(--glow);}
.btn-secondary{background:var(--border);color:var(--text);}
.btn-secondary:hover{background:#222238;}
.btn-grad{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.btn-grad:hover{box-shadow:0 0 24px rgba(129,140,248,.4);}
.btn:disabled{opacity:.35;cursor:not-allowed;}

/* VIDEO */
.video-wrap{position:relative;width:100%;aspect-ratio:4/3;border-radius:12px;overflow:hidden;background:#000;border:2px solid var(--border);}
#video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);}
#overlay{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.video-badge{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.75);border:1px solid var(--accent);
  padding:5px 16px;border-radius:16px;
  font-size:.75rem;font-weight:700;letter-spacing:2px;color:var(--accent);
  white-space:nowrap;pointer-events:none;
}
.feedback-bar{
  position:absolute;bottom:10px;left:10px;right:10px;
  background:rgba(0,0,0,.8);border-radius:8px;padding:7px 12px;
  display:flex;gap:12px;flex-wrap:wrap;align-items:center;
  pointer-events:none;
}
.fb-item{display:flex;align-items:center;gap:5px;font-size:.7rem;}
.fb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.fb-dot.good{background:var(--accent3);}
.fb-dot.warn{background:var(--accent4);}
.fb-dot.bad{background:var(--danger);}
.fb-dot.neutral{background:var(--dim);}

/* PROGRESS RING */
.ring-wrap{display:flex;justify-content:center;align-items:center;flex-direction:column;gap:4px;}
.ring{position:relative;width:80px;height:80px;}
.ring svg{transform:rotate(-90deg);}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-val{font-size:1.3rem;font-weight:800;color:var(--accent);line-height:1;}
.ring-lbl{font-size:.6rem;color:var(--dim);}

/* TIMER */
.timer-big{font-size:3.5rem;font-weight:900;color:var(--accent);text-align:center;font-variant-numeric:tabular-nums;letter-spacing:-2px;text-shadow:0 0 30px var(--glow);}
.progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin:6px 0;}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .1s linear;}

/* ASSESSMENT GRID */
.assess-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
@media(max-width:700px){.assess-grid{grid-template-columns:1fr 1fr;}}
.assess-card{
  background:var(--bg);border:1px solid var(--border);border-radius:10px;
  padding:14px;text-align:center;cursor:pointer;transition:all .2s;
}
.assess-card:hover{border-color:var(--accent);}
.assess-card.active{border-color:var(--accent);background:rgba(244,114,182,.08);box-shadow:0 0 12px var(--glow);}
.assess-card.done{border-color:var(--accent3);background:rgba(52,211,153,.07);}
.ac-icon{font-size:1.8rem;margin-bottom:4px;}
.ac-name{font-size:.8rem;font-weight:700;}
.ac-score{font-size:1.1rem;font-weight:800;margin-top:4px;}

/* ZONE BAR */
.zone-bars{display:flex;flex-direction:column;gap:8px;}
.zb-row{display:grid;grid-template-columns:90px 1fr 38px;gap:8px;align-items:center;}
.zb-label{font-size:.7rem;color:var(--dim);}
.zb-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.zb-fill{height:100%;border-radius:3px;transition:width .5s;}
.zb-val{font-size:.75rem;font-weight:700;text-align:right;}

/* EXERCISE LIST */
.ex-list{display:flex;flex-direction:column;gap:5px;max-height:55vh;overflow-y:auto;}
.ex-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;border:1px solid var(--border);
  cursor:pointer;transition:all .15s;background:var(--bg);
}
.ex-row:hover{border-color:var(--accent);}
.ex-row.active{border-color:var(--accent);background:rgba(244,114,182,.1);}
.ex-row.done{border-color:var(--accent3);background:rgba(52,211,153,.06);}
.ex-row.priority{border-left:3px solid var(--accent4);}
.er-icon{font-size:1.3rem;width:28px;text-align:center;}
.er-info{flex:1;}
.er-name{font-size:.82rem;font-weight:600;}
.er-meta{font-size:.62rem;color:var(--dim);margin-top:1px;}
.er-score{font-size:.8rem;font-weight:700;}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:.58rem;font-weight:700;letter-spacing:.5px;}
.badge-upper{background:rgba(129,140,248,.2);color:var(--accent2);}
.badge-mid{background:rgba(244,114,182,.2);color:var(--accent);}
.badge-lower{background:rgba(251,191,36,.2);color:var(--accent4);}
.badge-neck{background:rgba(52,211,153,.2);color:var(--accent3);}
.badge-priority{background:rgba(251,191,36,.25);color:var(--accent4);}
.badge-normal{background:rgba(71,85,105,.25);color:var(--dim);}

/* COMPENSATOR PANEL */
.comp-panel{
  border-radius:8px;padding:10px 12px;margin:8px 0;
  border:1px solid var(--border);font-size:.78rem;
}
.comp-panel.firing{border-color:var(--danger);background:rgba(248,113,113,.08);}
.comp-panel.ok{border-color:var(--accent3);background:rgba(52,211,153,.06);}
.comp-title{font-weight:700;margin-bottom:4px;}
.comp-firing{color:var(--danger);}
.comp-ok{color:var(--accent3);}

/* HISTORY */
.hist-list{display:flex;flex-direction:column;gap:8px;}
.hist-row{
  display:flex;align-items:center;gap:12px;
  padding:12px;border-radius:8px;background:var(--bg);
  border:1px solid var(--border);
}
.hist-date{font-size:.7rem;color:var(--dim);min-width:70px;}
.hist-bars{flex:1;display:flex;flex-direction:column;gap:4px;}
.hist-hbar-wrap{display:flex;align-items:center;gap:6px;}
.hist-hbar{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.hist-hbar-fill{height:100%;border-radius:2px;}
.hist-hbar-lbl{font-size:.62rem;color:var(--dim);width:40px;}
.hist-total{font-size:1.2rem;font-weight:800;color:var(--accent);min-width:44px;text-align:right;}

/* RESULT OVERLAY */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.88);
  display:none;z-index:200;align-items:center;justify-content:center;
}
.overlay.visible{display:flex;}
.overlay-card{
  background:var(--panel);border:1px solid var(--accent);border-radius:16px;
  padding:26px;max-width:520px;width:92%;
  box-shadow:0 0 60px rgba(244,114,182,.25);max-height:90vh;overflow-y:auto;
}
.oc-title{font-size:1.3rem;font-weight:800;color:var(--accent);margin-bottom:2px;}
.oc-sub{font-size:.72rem;color:var(--dim);margin-bottom:16px;}
.oc-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:.83rem;}
.oc-row:last-child{border-bottom:none;}
.oc-key{color:var(--dim);}
.good{color:var(--accent3);}
.ok{color:var(--accent4);}
.bad{color:var(--danger);}

/* phase prompt */
.phase-prompt{
  font-size:1rem;font-weight:800;text-align:center;padding:8px;
  border-radius:8px;background:rgba(244,114,182,.08);color:var(--accent);
  letter-spacing:2px;min-height:38px;margin:6px 0;
}
.rep-count{font-size:.9rem;font-weight:700;text-align:center;color:var(--accent2);}

/* scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">FACE <span>FITNESS</span></div>
  </div>
  <nav class="header-nav">
    <button class="nav-btn active" onclick="showScreen('assess')">평가</button>
    <button class="nav-btn" onclick="showScreen('program')">운동</button>
    <button class="nav-btn" onclick="showScreen('history')">기록</button>
  </nav>
</header>

<!-- ══════════════ ASSESSMENT SCREEN ══════════════ -->
<div class="screen active" id="screen-assess">
  <div style="display:grid;grid-template-columns:1fr 340px;gap:16px;">

    <!-- Left -->
    <div style="display:flex;flex-direction:column;gap:12px;">
      <!-- Camera -->
      <div class="video-wrap" id="aVideoWrap">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="video-badge" id="aBadge">카메라를 시작하세요</div>
        <div class="feedback-bar" id="aFeedback" style="display:none">
          <div class="fb-item"><div class="fb-dot" id="fbMigang"></div><span id="fbMigangTxt">미간</span></div>
          <div class="fb-item"><div class="fb-dot" id="fbBrow"></div><span id="fbBrowTxt">눈썹</span></div>
          <div class="fb-item"><div class="fb-dot" id="fbCorner"></div><span id="fbCornerTxt">입꼬리</span></div>
          <div class="fb-item"><div class="fb-dot" id="fbFront"></div><span id="fbFrontTxt">이마 보상</span></div>
        </div>
      </div>

      <!-- Controls -->
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="aCamBtn" onclick="startCamera()">카메라 시작</button>
        <button class="btn btn-grad" id="aStartBtn" onclick="startAssessment()" disabled>평가 시작</button>
        <button class="btn btn-secondary" id="aSkipBtn" onclick="skipTest()" disabled style="display:none">건너뛰기</button>
      </div>

      <!-- Timer (during assess) -->
      <div class="card" id="aTimerCard" style="display:none">
        <div class="card-title" id="aTimerLabel">—</div>
        <div class="timer-big" id="aTimer">0:00</div>
        <div class="progress-track"><div class="progress-fill" id="aProgress" style="width:0%"></div></div>
        <div class="phase-prompt" id="aPhasePrompt"></div>
      </div>
    </div>

    <!-- Right -->
    <div style="display:flex;flex-direction:column;gap:12px;">
      <!-- Test list -->
      <div class="card">
        <div class="card-title">평가 항목 (6개)</div>
        <div class="assess-grid" id="assessGrid"></div>
      </div>

      <!-- Live metrics during assess -->
      <div class="card" id="aMetricsCard">
        <div class="card-title">실시간 측정</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;" id="aMetrics">
            <div style="text-align:center;padding:8px;background:var(--bg);border-radius:6px;">
              <div style="font-size:1.1rem;font-weight:800;color:var(--accent);" id="mSmileL">—</div>
              <div style="font-size:.6rem;color:var(--dim);">좌 입꼬리</div>
            </div>
            <div style="text-align:center;padding:8px;background:var(--bg);border-radius:6px;">
              <div style="font-size:1.1rem;font-weight:800;color:var(--accent);" id="mSmileR">—</div>
              <div style="font-size:.6rem;color:var(--dim);">우 입꼬리</div>
            </div>
            <div style="text-align:center;padding:8px;background:var(--bg);border-radius:6px;">
              <div style="font-size:1.1rem;font-weight:800;color:var(--accent2);" id="mBrowL">—</div>
              <div style="font-size:.6rem;color:var(--dim);">좌 눈썹</div>
            </div>
            <div style="text-align:center;padding:8px;background:var(--bg);border-radius:6px;">
              <div style="font-size:1.1rem;font-weight:800;color:var(--accent2);" id="mBrowR">—</div>
              <div style="font-size:.6rem;color:var(--dim);">우 눈썹</div>
            </div>
            <div style="text-align:center;padding:8px;background:var(--bg);border-radius:6px;">
              <div style="font-size:1.1rem;font-weight:800;color:var(--accent4);" id="mEyeL">—</div>
              <div style="font-size:.6rem;color:var(--dim);">좌 눈 EAR</div>
            </div>
            <div style="text-align:center;padding:8px;background:var(--bg);border-radius:6px;">
              <div style="font-size:1.1rem;font-weight:800;color:var(--accent4);" id="mEyeR">—</div>
              <div style="font-size:.6rem;color:var(--dim);">우 눈 EAR</div>
            </div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--bg);border-radius:6px;">
            <span style="font-size:.7rem;color:var(--dim);">좌우 대칭</span>
            <span style="font-size:1rem;font-weight:800;color:var(--accent3);" id="mSym">—</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ PROGRAM SCREEN ══════════════ -->
<div class="screen" id="screen-program">
  <div style="display:grid;grid-template-columns:260px 1fr 280px;gap:14px;">

    <!-- Exercise list -->
    <div class="card" style="height:fit-content;max-height:85vh;display:flex;flex-direction:column;">
      <div class="card-title">운동 목록</div>
      <div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;" id="zoneFilter">
        <button class="btn btn-secondary" style="padding:4px 9px;font-size:.65rem;" onclick="filterEx('all',this)">전체</button>
        <button class="btn btn-secondary" style="padding:4px 9px;font-size:.65rem;" onclick="filterEx('priority',this)">우선순위</button>
        <button class="btn btn-secondary" style="padding:4px 9px;font-size:.65rem;" onclick="filterEx('upper',this)">상부</button>
        <button class="btn btn-secondary" style="padding:4px 9px;font-size:.65rem;" onclick="filterEx('mid',this)">중부</button>
        <button class="btn btn-secondary" style="padding:4px 9px;font-size:.65rem;" onclick="filterEx('lower',this)">하부</button>
        <button class="btn btn-secondary" style="padding:4px 9px;font-size:.65rem;" onclick="filterEx('neck',this)">목/턱</button>
      </div>
      <div class="ex-list" id="exList"></div>
    </div>

    <!-- Camera -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="video-wrap">
        <video id="video2" autoplay playsinline muted style="display:none;"></video>
        <canvas id="overlay2"></canvas>
        <div class="video-badge" id="pBadge">운동을 선택하세요</div>
        <div class="feedback-bar" id="pFeedback" style="display:none">
          <div class="fb-item"><div class="fb-dot" id="pComp1Dot"></div><span id="pComp1Txt">—</span></div>
          <div class="fb-item"><div class="fb-dot" id="pComp2Dot"></div><span id="pComp2Txt">—</span></div>
          <div class="fb-item"><div class="fb-dot" id="pComp3Dot"></div><span id="pComp3Txt">—</span></div>
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary" id="pStartBtn" onclick="startExercise()" disabled>운동 시작</button>
        <button class="btn btn-secondary" id="pStopBtn" onclick="stopExercise()" disabled>정지</button>
        <button class="btn btn-grad" onclick="startFullProgram()" style="flex:1;font-size:.78rem;">FULL PROGRAM</button>
      </div>

      <!-- Exercise detail -->
      <div class="card" id="exDetailCard">
        <div class="card-title">운동 안내</div>
        <div id="exDetail" style="color:var(--dim);font-size:.8rem;">운동을 선택하세요</div>
      </div>
    </div>

    <!-- Right metrics -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <div class="card">
        <div class="card-title">타이머</div>
        <div style="font-size:.65rem;color:var(--dim);text-align:center;" id="pTimerLbl">대기 중</div>
        <div class="timer-big" id="pTimer">0:00</div>
        <div class="progress-track"><div class="progress-fill" id="pProgress" style="width:0%"></div></div>
        <div class="phase-prompt" id="pPrompt"></div>
        <div class="rep-count" id="pReps"></div>
      </div>

      <!-- Compensator feedback -->
      <div class="card" id="compCard">
        <div class="card-title">⚠ 보상근육 감시</div>
        <div id="compFeedback" style="font-size:.78rem;color:var(--dim);">운동 시작 후 활성화됩니다</div>
      </div>

      <!-- FFI -->
      <div class="card">
        <div class="card-title">FFI 점수</div>
        <div class="ring-wrap" style="margin:6px 0;">
          <div class="ring">
            <svg width="80" height="80" viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="33" fill="none" stroke="var(--border)" stroke-width="7"/>
              <circle cx="40" cy="40" r="33" fill="none" stroke="url(#rg)" stroke-width="7"
                stroke-linecap="round" stroke-dasharray="207.3" stroke-dashoffset="207.3" id="ffiArc"/>
              <defs><linearGradient id="rg"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#818cf8"/></linearGradient></defs>
            </svg>
            <div class="ring-inner">
              <div class="ring-val" id="ffiVal">—</div>
              <div class="ring-lbl">/100</div>
            </div>
          </div>
        </div>
        <div id="ffiDomains"></div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════════ HISTORY SCREEN ══════════════ -->
<div class="screen" id="screen-history">
  <div style="max-width:800px;margin:0 auto;display:flex;flex-direction:column;gap:16px;">
    <div class="card">
      <div class="card-title">평가 기록</div>
      <div id="histAssess" style="color:var(--dim);font-size:.82rem;">기록 없음</div>
    </div>
    <div class="card">
      <div class="card-title">FFI 추이</div>
      <div id="histFFI" style="color:var(--dim);font-size:.82rem;">운동 기록 없음</div>
    </div>
  </div>
</div>

<!-- Result overlay -->
<div class="overlay" id="resultOverlay">
  <div class="overlay-card">
    <div class="oc-title" id="ocTitle">—</div>
    <div class="oc-sub" id="ocSub">—</div>
    <div id="ocRows"></div>
    <div style="display:flex;gap:8px;margin-top:16px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeOverlay()">닫기</button>
      <button class="btn btn-primary" style="flex:1;display:none;" id="ocNext" onclick="seqNext()">다음 →</button>
    </div>
  </div>
</div>

<!-- Assessment complete overlay -->
<div class="overlay" id="assessOverlay">
  <div class="overlay-card">
    <div class="oc-title">평가 완료 🎯</div>
    <div class="oc-sub" id="aoSub">FFI 기준 점수 측정 완료</div>
    <div id="aoResults"></div>
    <div style="margin-top:16px;padding:12px;background:rgba(244,114,182,.08);border-radius:8px;border-left:3px solid var(--accent);">
      <div style="font-size:.72rem;font-weight:700;color:var(--accent);margin-bottom:6px;">맞춤 프로그램 처방</div>
      <div id="aoPrescription" style="font-size:.78rem;color:var(--text);line-height:1.7;"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn btn-secondary" style="flex:1;" onclick="closeAssessOverlay()">닫기</button>
      <button class="btn btn-grad" style="flex:1;" onclick="goToProgram()">운동 시작 →</button>
    </div>
  </div>

async function startCamera() {
  document.getElementById('aCamBtn').disabled = true;
  document.getElementById('aCamBtn').textContent = '로딩 중...';
  try {
    const video  = document.getElementById('video');
    const video2 = document.getElementById('video2');
    const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
    camStream = stream;
    video.srcObject = stream;
    video2.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
    video.play(); video2.play(); video2.style.display = '';
    resizeCanvases();
    window.addEventListener('resize', resizeCanvases);
    await loadFM();
    cameraActive = true;
    document.getElementById('aCamBtn').textContent = '카메라 ON';
    document.getElementById('aStartBtn').disabled = false;
    document.getElementById('pStartBtn').disabled = false;
    document.getElementById('pBadge').textContent = '운동을 선택하세요';
    document.getElementById('aFeedback').style.display = '';
    document.getElementById('pFeedback').style.display = '';
    requestAnimationFrame(frameLoop);
  } catch(e) {
    alert('카메라 접근 실패: ' + e.message);
    document.getElementById('aCamBtn').disabled = false;
    document.getElementById('aCamBtn').textContent = '카메라 시작';
  }
}

function resizeCanvases() {
  ['overlay','overlay2'].forEach((id, i) => {
    const v = document.getElementById(i===0?'video':'video2');
    const c = document.getElementById(id);
    c.width = v.offsetWidth; c.height = v.offsetHeight;
  });
}

async function loadFM() {
  if (fmLoaded || fmLoading) return;
  fmLoading = true;
  faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
  faceMesh.onResults(r => lastFaceResults = r);
  await faceMesh.initialize();
  fmLoaded = true; fmLoading = false;
}

let lastVideoTime = -1;
async function frameLoop() {
  if (!cameraActive) return;
  const video = document.getElementById('video');
  if (fmLoaded && video.readyState >= 2 && video.currentTime !== lastVideoTime) {
    lastVideoTime = video.currentTime;
    await faceMesh.send({image: video});
    if (lastFaceResults?.multiFaceLandmarks?.[0]) {
      const lm = lastFaceResults.multiFaceLandmarks[0];
      drawFaceOnBoth(lm);
      analyzeFrame(lm);
    }
  }
  requestAnimationFrame(frameLoop);
}

function drawFaceOnCanvas(canvasId, lm) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  ctx.clearRect(0,0,W,H);
  const lx = i => (1 - lm[i].x) * W;
  const ly = i => lm[i].y * H;

  // Convex hull
  const pts = []; for(let i=0;i<468;i++) pts.push({x:lx(i),y:ly(i)});
  pts.sort((a,b)=>a.x!==b.x?a.x-b.x:a.y-b.y);
  const cross=(O,A,B)=>(A.x-O.x)*(B.y-O.y)-(A.y-O.y)*(B.x-O.x);
  const hull=[]; for(const p of pts){while(hull.length>=2&&cross(hull[hull.length-2],hull[hull.length-1],p)<=0)hull.pop();hull.push(p);}
  const lo=hull.length+1; for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(hull.length>=lo&&cross(hull[hull.length-2],hull[hull.length-1],p)<=0)hull.pop();hull.push(p);} hull.pop();
  ctx.save(); ctx.strokeStyle='rgba(244,114,182,0.45)'; ctx.lineWidth=1.8; ctx.shadowBlur=8; ctx.shadowColor='#f472b6';
  ctx.beginPath(); hull.forEach((p,n)=>n===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.closePath(); ctx.stroke(); ctx.restore();

  // Dense mesh
  if (!faceEdgeCache) {
    faceEdgeCache=[];
    const T=0.078;
    for(let i=0;i<468;i++) for(let j=i+1;j<468;j++){const dx=lm[i].x-lm[j].x,dy=lm[i].y-lm[j].y;if(dx*dx+dy*dy<T*T)faceEdgeCache.push([i,j]);}
  }
  ctx.save(); ctx.strokeStyle='rgba(244,114,182,0.12)'; ctx.lineWidth=0.5;
  ctx.beginPath(); faceEdgeCache.forEach(([a,b])=>{ctx.moveTo(lx(a),ly(a));ctx.lineTo(lx(b),ly(b));}); ctx.stroke(); ctx.restore();

  // Feature edges
  const fe=(edges,col,lw)=>{ctx.save();ctx.strokeStyle=col;ctx.lineWidth=lw;ctx.shadowBlur=4;ctx.shadowColor=col;ctx.beginPath();edges.forEach(([a,b])=>{ctx.moveTo(lx(a),ly(a));ctx.lineTo(lx(b),ly(b));});ctx.stroke();ctx.restore();};
  fe(FM_L_EYE,'rgba(129,140,248,0.8)',1.2); fe(FM_R_EYE,'rgba(129,140,248,0.8)',1.2);
  fe(FM_L_BROW,'rgba(251,191,36,0.7)',1.1); fe(FM_R_BROW,'rgba(251,191,36,0.7)',1.1);
  fe(FM_LIPS,'rgba(244,114,182,0.75)',1.2);
  fe(FM_NOSE,'rgba(52,211,153,0.55)',0.8);

  // Dots
  ctx.save(); ctx.fillStyle='rgba(244,114,182,0.65)';
  ctx.beginPath(); for(let i=0;i<468;i++){const x=lx(i),y=ly(i);ctx.moveTo(x+2,y);ctx.arc(x,y,2,0,Math.PI*2);} ctx.fill(); ctx.restore();

  // Glabellar line (key metric)
  const gx1=lx(107), gy1=ly(107), gx2=lx(336), gy2=ly(336);
  ctx.save(); ctx.strokeStyle='rgba(251,191,36,0.5)'; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
  ctx.beginPath(); ctx.moveTo(gx1,gy1); ctx.lineTo(gx2,gy2); ctx.stroke(); ctx.restore();

  // Mouth-corner vectors (for risorius detection)
  if (blDone && (assessActive || exState==='running')) {
    const cx1=lx(61), cy1=ly(61), cx2=lx(291), cy2=ly(291);
    const bcy1 = BL.leftCornerY * H, bcy2 = BL.rightCornerY * H;
    // vector arrows
    [[cx1,cy1,bcy1,'#f472b6'],[cx2,cy2,bcy2,'#f472b6']].forEach(([cx,cy,bcy,col])=>{
      const vy = bcy - cy;
      if(Math.abs(vy)>2){
        ctx.save(); ctx.strokeStyle=col+'aa'; ctx.lineWidth=2; ctx.shadowBlur=4; ctx.shadowColor=col;
        ctx.beginPath(); ctx.moveTo(cx,bcy); ctx.lineTo(cx,cy); ctx.stroke(); ctx.restore();
      }
    });
  }
}

// ═══════════════════════════════════════════════════════════
// FACE ANALYSIS — PER FRAME
// ═══════════════════════════════════════════════════════════
function fD(lm,a,b){const dx=lm[a].x-lm[b].x,dy=lm[a].y-lm[b].y;return Math.sqrt(dx*dx+dy*dy);}

const metrics = {};
function analyzeFrame(lm) {
  // EAR
  metrics.earL = (fD(lm,160,144)+fD(lm,158,153))/(2*fD(lm,33,133)+1e-5);
  metrics.earR = (fD(lm,387,373)+fD(lm,385,380))/(2*fD(lm,263,362)+1e-5);
  // Brow heights
  metrics.browLY = (lm[66].y+lm[105].y)/2;
  metrics.browRY = (lm[296].y+lm[334].y)/2;
  // Corner
  metrics.cornerLY = lm[61].y;
  metrics.cornerRY = lm[291].y;
  // Mouth
  metrics.mouthH = fD(lm,13,14);
  metrics.mouthW = fD(lm,61,291);
  // Glabellar (corrugator proxy)
  metrics.glabellarD = fD(lm,107,336);
  // Forehead (frontalis/procerus proxy)
  metrics.foreheadY = (lm[10].y+lm[151].y)/2;
  // Chin (mentalis)
  metrics.chinY = lm[152].y;

  // Baseline accumulation
  if (!blDone && BL.n < BL_FRAMES) {
    const f = BL.n;
    BL.leftCornerY  = (BL.leftCornerY*f  + metrics.cornerLY)  / (f+1);
    BL.rightCornerY = (BL.rightCornerY*f + metrics.cornerRY)  / (f+1);
    BL.leftBrowY    = (BL.leftBrowY*f    + metrics.browLY)    / (f+1);
    BL.rightBrowY   = (BL.rightBrowY*f   + metrics.browRY)    / (f+1);
    BL.earL         = (BL.earL*f         + metrics.earL)      / (f+1);
    BL.earR         = (BL.earR*f         + metrics.earR)      / (f+1);
    BL.jawH         = (BL.jawH*f         + metrics.mouthH)    / (f+1);
    BL.mouthW       = (BL.mouthW*f       + metrics.mouthW)    / (f+1);
    BL.glabellarD   = (BL.glabellarD*f   + metrics.glabellarD)/ (f+1);
    BL.foreheadY    = (BL.foreheadY*f    + metrics.foreheadY) / (f+1);
    BL.n++;
    if (BL.n >= BL_FRAMES) { blDone = true; document.getElementById('aBadge').textContent = '✓ 기준 측정 완료 — 평가 시작 가능'; }
    else document.getElementById('aBadge').textContent = `기준값 측정 중 ${Math.round(BL.n/BL_FRAMES*100)}%`;
  }

  // Relative metrics (requires baseline)
  if (blDone) {
    metrics.relSmileL  = BL.leftCornerY  - metrics.cornerLY;  // positive = rose
    metrics.relSmileR  = BL.rightCornerY - metrics.cornerRY;
    metrics.relBrowL   = BL.leftBrowY    - metrics.browLY;    // positive = rose
    metrics.relBrowR   = BL.rightBrowY   - metrics.browRY;
    metrics.relJaw     = metrics.mouthH  - BL.jawH;
    metrics.relEarL    = metrics.earL    - BL.earL;
    metrics.relEarR    = metrics.earR    - BL.earR;
    // Corrugator proxy: glabellar NARROWING
    metrics.corrugator = BL.glabellarD - metrics.glabellarD; // positive = narrowed = firing
    // Frontalis compensation: brow rising while eye is closing
    metrics.frontalBrow = BL.foreheadY - metrics.foreheadY; // positive = rose
    // Risorius proxy: corner vector angle
    // If rise is negative (corner went down) or horizontal → risorius/platysma
    metrics.smileVecL  = Math.abs(metrics.relSmileL) > 0.001 ? metrics.relSmileL : 0;
    metrics.smileVecR  = Math.abs(metrics.relSmileR) > 0.001 ? metrics.relSmileR : 0;
    // Platysma proxy: corner descent during upward exercise
    metrics.platysma   = Math.max(0, metrics.cornerLY - BL.leftCornerY, metrics.cornerRY - BL.rightCornerY);
    // Symmetry
    const smAsym  = Math.abs(metrics.relSmileL - metrics.relSmileR);
    const brAsym  = Math.abs(metrics.relBrowL  - metrics.relBrowR);
    const earAsym = Math.abs(metrics.earL - metrics.earR);
    metrics.symScore = Math.max(0, 100 - (smAsym+brAsym+earAsym)/3 * 1800);

    updateLiveUI();
    updateCompensatorUI();

    if (assessActive) assessBuf.push({...metrics});
    if (exState === 'running') exMeasureBuf.push({...metrics});
  }
}

function updateLiveUI() {
  const fmt = v => (v>=0?'+':'') + (v*100).toFixed(1);
  document.getElementById('mSmileL').textContent = fmt(metrics.relSmileL||0);
  document.getElementById('mSmileR').textContent = fmt(metrics.relSmileR||0);
  document.getElementById('mBrowL').textContent  = fmt(metrics.relBrowL||0);
  document.getElementById('mBrowR').textContent  = fmt(metrics.relBrowR||0);
  document.getElementById('mEyeL').textContent   = (metrics.earL||0).toFixed(3);
  document.getElementById('mEyeR').textContent   = (metrics.earR||0).toFixed(3);
  document.getElementById('mSym').textContent    = Math.round(metrics.symScore||0);

  // Top-level feedback dots (assess screen)
  const setDot = (dotId,txtId,val,thresh,label,firing) => {
    const d=document.getElementById(dotId), t=document.getElementById(txtId);
    const fire = Math.abs(val)>thresh;
    d.className='fb-dot '+(fire?'bad':'good');
    t.textContent=label+(fire?' ⚠':'');
  };
  setDot('fbMigang','fbMigangTxt',metrics.corrugator||0,0.003,'미간');
  setDot('fbBrow','fbBrowTxt',metrics.relBrowL||0,0.003,'눈썹');
  setDot('fbCorner','fbCornerTxt',metrics.relSmileL||0,-0.002,'입꼬리');
  setDot('fbFront','fbFrontTxt',metrics.frontalBrow||0,0.003,'이마 보상');
}

function updateCompensatorUI() {
  if (exState !== 'running') return;
  const ex = EXERCISES[exIdx];
  if (!ex) return;
  const lines = ex.compensators.map(comp => {
    let firing = false;
    let val = 0;
    if (comp.key==='corrugator') { val=metrics.corrugator||0; firing=val>0.004; }
    else if (comp.key==='frontalis') { val=metrics.frontalBrow||0; firing=val>0.003 && exState==='running'; }
    else if (comp.key==='risorius') {
      // Detect: corner moves too horizontal (not enough rise)
      firing = (metrics.relSmileL||0) < 0.002 && (metrics.mouthW > BL.mouthW*1.03);
    }
    else if (comp.key==='platysma') { val=metrics.platysma||0; firing=val>0.004; }
    else if (comp.key==='lipCompress') { firing = (metrics.mouthW||0) < BL.mouthW*0.9; }
    else if (comp.key==='dao') { firing = (metrics.relSmileL||0)<-0.002||(metrics.relSmileR||0)<-0.002; }
    const dot = firing ? '🔴' : '🟢';
    const cls = firing ? 'comp-firing' : 'comp-ok';
    return `<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
      <span>${dot}</span>
      <span class="${cls}"><b>${comp.name}</b></span>
      ${firing?`<span style="color:var(--danger);font-size:.7rem">⚠ ${comp.cue}</span>`:''}
    </div>`;
  });
  document.getElementById('compFeedback').innerHTML = lines.join('');

  // Feedback dots on program camera
  ex.compensators.forEach((comp,i) => {
    const dot = document.getElementById('pComp'+(i+1)+'Dot');
    const txt = document.getElementById('pComp'+(i+1)+'Txt');
    if (!dot) return;
    let firing = false;
    if (comp.key==='corrugator') firing=(metrics.corrugator||0)>0.004;
    else if (comp.key==='frontalis') firing=(metrics.frontalBrow||0)>0.003;
    else if (comp.key==='risorius') firing=(metrics.relSmileL||0)<0.002&&(metrics.mouthW>BL.mouthW*1.03);
    else if (comp.key==='platysma') firing=(metrics.platysma||0)>0.004;
    dot.className='fb-dot '+(firing?'bad':'good');
    txt.textContent=comp.name+(firing?' ⚠':'');
  });
}

// ASSESSMENT
// ═══════════════════════════════════════════════════════════
function renderAssessGrid() {
  const grid = document.getElementById('assessGrid');
  grid.innerHTML = ASSESS_TESTS.map((t,i) => {
    const done = assessResults[t.id] !== undefined;
    return `<div class="assess-card${done?' done':''}" id="ac_${t.id}">
      <div class="ac-icon">${t.icon}</div>
      <div class="ac-name">${t.name}</div>
      ${done ? `<div class="ac-score" style="color:var(--accent3)">✓</div>` : `<div style="font-size:.65rem;color:var(--dim)">${t.desc}</div>`}
    </div>`;
  }).join('');
}

let assessIdx2 = -1;
function startAssessment() {
  if (!cameraActive || !blDone) { alert('기준값 측정이 완료되지 않았습니다. 잠시 기다리세요.'); return; }
  // Clear previous
  Object.keys(assessResults).forEach(k => delete assessResults[k]);
  assessIdx2 = 0;
  document.getElementById('aStartBtn').disabled = true;
  document.getElementById('aSkipBtn').style.display = '';
  document.getElementById('aSkipBtn').disabled = false;
  document.getElementById('aTimerCard').style.display = '';
  runAssessTest();
}

function runAssessTest() {
  if (assessIdx2 >= ASSESS_TESTS.length) { finishAssessment(); return; }
  const t = ASSESS_TESTS[assessIdx2];
  assessBuf = [];
  assessActive = true;

  // Highlight current card
  document.querySelectorAll('.assess-card').forEach((c,i) => {
    c.classList.toggle('active', i===assessIdx2);
  });

  document.getElementById('aTimerLabel').textContent = `${assessIdx2+1}/${ASSESS_TESTS.length}: ${t.name}`;
  document.getElementById('aPhasePrompt').textContent = t.instruction;
  document.getElementById('aBadge').textContent = `${t.icon} ${t.name}`;

  let cd = 3;
  document.getElementById('aTimer').textContent = '3';
  const cdInt = setInterval(() => {
    cd--;
    if (cd <= 0) { clearInterval(cdInt); doAssessTest(t); }
    else document.getElementById('aTimer').textContent = cd;
  }, 1000);
}

function doAssessTest(t) {
  const dur = t.duration * 1000;
  const start = Date.now();
  document.getElementById('aProgress').style.width = '0%';
  const iv = setInterval(() => {
    const el = Date.now() - start;
    const pct = Math.min(100, (el/dur)*100);
    const rem = Math.ceil((dur-el)/1000);
    document.getElementById('aTimer').textContent = `${Math.floor(rem/60)}:${String(rem%60).padStart(2,'0')}`;
    document.getElementById('aProgress').style.width = pct + '%';
    if (el >= dur) {
      clearInterval(iv);
      assessActive = false;
      assessResults[t.id] = computeAssessMetrics(t, [...assessBuf]);
      document.getElementById('ac_'+t.id).classList.remove('active');
      document.getElementById('ac_'+t.id).classList.add('done');
      document.getElementById('ac_'+t.id).innerHTML =
        `<div class="ac-icon">${t.icon}</div><div class="ac-name">${t.name}</div><div class="ac-score" style="color:var(--accent3)">✓</div>`;
      assessIdx2++;
      setTimeout(runAssessTest, 800);
    }
  }, 100);
}

function skipTest() {
  assessActive = false;
  assessResults[ASSESS_TESTS[assessIdx2].id] = null;
  assessIdx2++;
  setTimeout(runAssessTest, 300);
}

function computeAssessMetrics(t, buf) {
  if (!buf.length) return null;
  const avg = key => buf.reduce((a,b)=>(a+(b[key]||0)),0)/buf.length;
  const maxVal = key => Math.max(...buf.map(b=>b[key]||0));
  return {
    smileL: avg('relSmileL'), smileR: avg('relSmileR'),
    maxSmileL: maxVal('relSmileL'), maxSmileR: maxVal('relSmileR'),
    browL: avg('relBrowL'), browR: avg('relBrowR'),
    maxBrowL: maxVal('relBrowL'), maxBrowR: maxVal('relBrowR'),
    earL: avg('earL'), earR: avg('earR'),
    jaw: avg('relJaw'), maxJaw: maxVal('relJaw'),
    corrugator: avg('corrugator'), frontalComp: avg('frontalBrow'),
    platysma: avg('platysma'),
    sym: avg('symScore'), n: buf.length,
  };
}

function finishAssessment() {
  assessActive = false;
  document.getElementById('aStartBtn').disabled = false;
  document.getElementById('aSkipBtn').style.display = 'none';
  document.getElementById('aTimerCard').style.display = 'none';
  document.getElementById('aBadge').textContent = '평가 완료!';

  // Compute zone scores
  computeZoneScores();
  showAssessResults();
  saveAssessToHistory();
}

function computeZoneScores() {
  const sm = assessResults['smile'];
  const br = assessResults['browRaise'];
  const ey = assessResults['eyeClose'];
  const mo = assessResults['mouthOpen'];
  const lp = assessResults['lipSeal'];

  // Upper face: brow raise + eye close
  let upper = 50;
  if (br) {
    const brRange = ((br.maxBrowL||0) + (br.maxBrowR||0))/2 * 1000;
    const brAsym  = Math.abs((br.browL||0) - (br.browR||0)) * 1000;
    const brComp  = (br.corrugator||0) * 500; // compensator penalty
    upper = Math.min(100, Math.max(0, brRange * 4 - brComp - brAsym));
  }
  if (ey) {
    const eyComp = (ey.frontalComp||0) * 800;
    const eyScore = Math.max(0, 80 - eyComp);
    upper = (upper + eyScore) / 2;
  }
  zoneScores.upper = Math.round(upper);

  // Mid face: smile
  let mid = 50;
  if (sm) {
    const smRange = ((sm.maxSmileL||0) + (sm.maxSmileR||0))/2 * 1000;
    const smAsym  = Math.abs((sm.smileL||0) - (sm.smileR||0)) * 1000;
    const plat    = (sm.platysma||0) * 800;
    mid = Math.min(100, Math.max(0, smRange * 3.5 + sm.sym*0.3 - smAsym*0.5 - plat));
  }
  zoneScores.mid = Math.round(mid);

  // Lower face: mouth open + lip seal
  let lower = 50;
  if (mo) { lower = Math.min(100, (mo.maxJaw||0) * 1200 + 40); }
  zoneScores.lower = Math.round(lower);

  // Neck/chin: overall symmetry proxy
  zoneScores.neck = Math.round(assessResults['baseline']?.sym || 50);

  // Determine priority zones (score < 60)
  priorityZones.length = 0;
  Object.entries(zoneScores).forEach(([z,s]) => { if(s!==null && s<65) priorityZones.push(z); });

  // Update exercise priorities
  EXERCISES.forEach(ex => { ex.priority = priorityZones.includes(ex.zone); });
}

function showAssessResults() {
  const rows = Object.entries(zoneScores).map(([z,s]) => {
    const label = {upper:'상부 (눈/이마)',mid:'중부 (볼/팔자)',lower:'하부 (입/입꼬리)',neck:'목/턱'}[z];
    const cls = s>=75?'good':s>=55?'ok':'bad';
    const bar = `<div style="width:${s||0}%;height:4px;background:${s>=75?'var(--accent3)':s>=55?'var(--accent4)':'var(--danger)'};border-radius:2px;margin-top:3px;"></div>`;
    return `<div class="oc-row">
      <span class="oc-key">${label}</span>
      <div style="text-align:right">
        <span class="oc-val ${cls}">${s??'—'}점</span>
        ${bar}
      </div>
    </div>`;
  }).join('');

  // Compensator patterns detected
  const br = assessResults['browRaise'];
  const sm = assessResults['smile'];
  const ey = assessResults['eyeClose'];
  const warnings = [];
  if (br?.corrugator > 0.003) warnings.push('눈썹 올리기 중 <b>미간주름근 보상</b> 감지 — 이마 주름 위험');
  if (sm?.platysma > 0.003)   warnings.push('미소 중 <b>광경근 보상</b> 감지 — 볼 처짐 가속 위험');
  if (ey?.frontalComp > 0.003) warnings.push('눈 감기 중 <b>이마 보상</b> 감지 — 안륜근 약화 패턴');
  if (sm?.maxSmileL && sm?.maxSmileR) {
    const diff = Math.abs(sm.maxSmileL - sm.maxSmileR) * 100;
    if (diff > 0.5) warnings.push(`미소 좌우 차이 ${diff.toFixed(1)} — 비대칭 개선 필요`);
  }

  const prescription = priorityZones.length
    ? `집중 개선 구역: <b>${priorityZones.map(z=>({upper:'상부',mid:'중부',lower:'하부',neck:'목/턱'})[z]).join(', ')}</b><br>` +
      EXERCISES.filter(e=>e.priority).map(e=>`• ${e.icon} ${e.name}`).join('<br>')
    : '전체 구역 균형 유지 중. 전체 프로그램 진행을 권장합니다.';

  document.getElementById('aoSub').textContent = `전체 평균 ${Math.round(Object.values(zoneScores).filter(Boolean).reduce((a,b)=>a+b,0)/4)}점`;
  document.getElementById('aoResults').innerHTML = rows +
    (warnings.length ? `<div style="margin:10px 0;padding:8px;background:rgba(248,113,113,.08);border-radius:6px;border-left:3px solid var(--danger);font-size:.75rem;line-height:1.7;">${warnings.join('<br>')}</div>` : '');
  document.getElementById('aoPrescription').innerHTML = prescription;
  document.getElementById('assessOverlay').classList.add('visible');
}

function closeAssessOverlay() { document.getElementById('assessOverlay').classList.remove('visible'); }
function goToProgram() { closeAssessOverlay(); showScreen('program'); }

      👆 ${ex.tipFingerPlace}
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;font-size:.7rem;color:var(--dim);">
      <span>⏱ ${ex.duration}초/세트</span><span>×${ex.sets}세트</span><span>⏸ ${ex.holdSec}초 유지</span>
    </div>`;

  // Show compensators
  document.getElementById('compFeedback').innerHTML = ex.compensators.map(c=>
    `<div style="margin-bottom:5px;"><span style="color:var(--dim)">⚠ 주의:</span> <b>${c.name}</b><br>
    <span style="font-size:.7rem;color:var(--dim)">감지 단서: ${c.cue}</span></div>`
  ).join('<hr style="border:none;border-top:1px solid var(--border);margin:5px 0;">');
}

function startExercise() {
  if (!cameraActive || exState!=='idle') return;
  if (!blDone) { alert('기준값 측정 중입니다. 잠시 기다리세요.'); return; }
  const ex = EXERCISES[exIdx];
  exMeasureBuf.length = 0;
  exSetNum = 1;
  exState = 'countdown';
  document.getElementById('pStartBtn').disabled = true;
  document.getElementById('pStopBtn').disabled = false;

  let cd = 3;
  document.getElementById('pBadge').textContent = `${ex.name} 준비 ${cd}...`;
  const cdInt = setInterval(() => {
    cd--;
    if (cd<=0){ clearInterval(cdInt); beginExSet(); }
    else document.getElementById('pBadge').textContent = `${cd}...`;
  }, 1000);
}

function beginExSet() {
  const ex = EXERCISES[exIdx];
  exState = 'running';
  exStartTime = Date.now();
  const dur = ex.duration * 1000;
  document.getElementById('pTimerLbl').textContent = `세트 ${exSetNum} / ${ex.sets}`;
  document.getElementById('pBadge').textContent = `${ex.icon} ${ex.name}`;

  exTimer = setInterval(() => {
    const el = Date.now() - exStartTime;
    const rem = Math.max(0, dur - el);
    const pct = (el/dur)*100;
    document.getElementById('pTimer').textContent = `${Math.floor(Math.ceil(rem/1000)/60)}:${String(Math.ceil(rem/1000)%60).padStart(2,'0')}`;
    document.getElementById('pProgress').style.width = pct + '%';

    const frac = el/dur;
    const phase = ex.phase;
    let prompt = '';
    if (phase==='smile')    prompt = frac<0.2?'중립...' : frac<0.7?'😊 볼을 위로 끌어올리세요!' : '천천히 이완...';
    else if(phase==='browRaise') prompt = `눈썹 올리고 유지 ${ex.holdSec}초 — 이마 주름 없이`;
    else if(phase==='eyeSquint') prompt = frac<0.5?'👁 아래 눈꺼풀만 위로' : '이완...';
    else if(phase==='puff') prompt = '볼 공기 → 좌↔우 이동';
    else if(phase==='snarl') prompt = '코 옆 ↑ 올리기';
    else if(phase==='chin') prompt = frac<0.5?'유지...' : '천천히 이완';
    else if(phase==='vowel'){
      const v=['아','에','이','오','우'][Math.floor(frac*5)%5];
      prompt = `"${v}" — 과장되게 크게`;
    }
    document.getElementById('pPrompt').textContent = prompt;

    if (el >= dur) { clearInterval(exTimer); onExSetDone(); }
  }, 100);
}

function onExSetDone() {
  const ex = EXERCISES[exIdx];
  if (exSetNum < ex.sets) {
    exState = 'rest';
    exSetNum++;
    let rest = 15;
    document.getElementById('pBadge').textContent = `휴식 ${rest}초`;
    document.getElementById('pTimerLbl').textContent = `세트 ${exSetNum-1} 완료 · 휴식`;
    document.getElementById('pPrompt').textContent = `다음: 세트 ${exSetNum}`;
    const ri = setInterval(() => {
      rest--;
      document.getElementById('pBadge').textContent = `휴식 ${rest}초`;
      document.getElementById('pTimer').textContent = `0:${String(rest).padStart(2,'0')}`;
      if (rest<=0){ clearInterval(ri); beginExSet(); }
    }, 1000);
  } else {
    exState = 'done';
    finishExercise();
  }
}

function finishExercise() {
  const ex = EXERCISES[exIdx];
  clearInterval(exTimer);
  document.getElementById('pStopBtn').disabled = true;
  document.getElementById('pBadge').textContent = '✓ 완료';

  const score = computeExScore(ex);
  exScores[ex.id] = score;
  updateFFI();
  renderExList(document.querySelector('#zoneFilter .btn-primary')?.textContent||'all');
  showExResult(ex, score);
  saveExToHistory(score);
}

function computeExScore(ex) {
  const buf = exMeasureBuf;
  if (!buf.length) return 50;
  const avg = key => buf.reduce((a,b)=>(a+(b[key]||0)),0)/buf.length;
  const activation = Math.min(100, Math.max(0, avg(ex.measure==='smileRise'?'relSmileL':'relBrowL') * 1500 + 50));
  const symmetry   = avg('symScore');
  // Compensator penalty
  let compPenalty = 0;
  ex.compensators.forEach(c => {
    if (c.key==='corrugator') compPenalty += avg('corrugator') * 300;
    else if (c.key==='frontalis') compPenalty += avg('frontalBrow') * 300;
    else if (c.key==='platysma') compPenalty += avg('platysma') * 300;
  });
  return Math.round(Math.min(100, Math.max(0, activation*0.5 + symmetry*0.35 - compPenalty*0.15)));
}

function showExResult(ex, score) {
  const buf = exMeasureBuf;
  if (!buf.length) return;
  const avg = key => buf.reduce((a,b)=>(a+(b[key]||0)),0)/buf.length;
  const fmt = v => (v>=0?'+':'')+(v*100).toFixed(1);
  const cls = s => s>=75?'good':s>=55?'ok':'bad';

  const compRows = ex.compensators.map(c => {
    let avgV = 0;
    if (c.key==='corrugator') avgV = avg('corrugator');
    else if (c.key==='frontalis') avgV = avg('frontalBrow');
    else if (c.key==='platysma') avgV = avg('platysma');
    const firing = avgV > 0.003;
    return `<div class="oc-row"><span class="oc-key">${c.name}</span><span class="${firing?'bad':'good'}">${firing?'⚠ 활성화됨':'✓ 억제됨'}</span></div>`;
  }).join('');

  document.getElementById('ocTitle').textContent = `${ex.icon} ${ex.name} 완료`;
  document.getElementById('ocSub').textContent = `${ex.sets}세트 완료`;
  document.getElementById('ocRows').innerHTML = `
    <div class="oc-row"><span class="oc-key">FFI 점수</span><span class="${cls(score)}">${score}점</span></div>
    <div class="oc-row"><span class="oc-key">좌우 대칭</span><span class="${cls(Math.round(avg('symScore')))}">${Math.round(avg('symScore'))}점</span></div>
    <div class="oc-row"><span class="oc-key">좌 입꼬리 상승</span><span>${fmt(avg('relSmileL'))}</span></div>
    <div class="oc-row"><span class="oc-key">우 입꼬리 상승</span><span>${fmt(avg('relSmileR'))}</span></div>
    <hr style="border:none;border-top:1px solid var(--border);margin:4px 0;">
    <div style="font-size:.7rem;color:var(--dim);margin:4px 0;">보상근육 억제 여부</div>
    ${compRows}`;
  document.getElementById('ocNext').style.display = seqMode ? '' : 'none';
  document.getElementById('resultOverlay').classList.add('visible');
}

function closeOverlay() {
  document.getElementById('resultOverlay').classList.remove('visible');
  exState = 'idle';
  document.getElementById('pStartBtn').disabled = false;
  document.getElementById('pTimer').textContent = '0:00';
  document.getElementById('pProgress').style.width = '0%';
  document.getElementById('pPrompt').textContent = '';
  document.getElementById('pReps').textContent = '';
}

function stopExercise() {
  clearInterval(exTimer);
  exState = 'idle';
  document.getElementById('pStartBtn').disabled = false;
  document.getElementById('pStopBtn').disabled = true;
  document.getElementById('pBadge').textContent = '중지됨';
  document.getElementById('pTimer').textContent = '0:00';
  document.getElementById('pProgress').style.width = '0%';
}

// ═══════════════════════════════════════════════════════════
// SEQUENTIAL
// ═══════════════════════════════════════════════════════════
function startFullProgram() {
  seqMode = true; seqIdx = 0;
  Object.keys(exScores).forEach(k=>delete exScores[k]);
  closeOverlay();
  const order = priorityZones.length
    ? [...EXERCISES.filter(e=>e.priority), ...EXERCISES.filter(e=>!e.priority)]
    : EXERCISES;
  window._seqOrder = order;
  seqAdvanceInner();
}

function seqAdvanceInner() {
  const order = window._seqOrder || EXERCISES;
  if (seqIdx >= order.length) { showFullSummary(); return; }
  selectEx(EXERCISES.indexOf(order[seqIdx]));
  closeOverlay();
  document.getElementById('pBadge').textContent = `${seqIdx+1}/${order.length}: ${order[seqIdx].name} 준비 중...`;
  if (cameraActive) setTimeout(() => { if(exState==='idle'&&blDone) startExercise(); }, 3500);
}

function seqNext() { seqIdx++; seqAdvanceInner(); }

function showFullSummary() {
  seqMode = false;
  const order = window._seqOrder || EXERCISES;
  const scored = order.filter(e=>exScores[e.id]!==undefined);
  const total = Math.round(scored.reduce((a,e)=>a+exScores[e.id],0)/scored.length);
  document.getElementById('ocTitle').textContent = '🏆 Full Program 완료!';
  document.getElementById('ocSub').textContent = `${scored.length}개 운동 · FFI ${total}점`;
  document.getElementById('ocRows').innerHTML = order.map(e=>{
    const s=exScores[e.id];
    return `<div class="oc-row"><span class="oc-key">${e.icon} ${e.name}</span><span class="${s>=75?'good':s>=55?'ok':'bad'}">${s??'—'}점</span></div>`;
  }).join('')+`<div class="oc-row" style="border-top:2px solid var(--accent);font-size:1rem;">
    <span class="oc-key" style="font-weight:700;color:var(--text)">총 FFI</span>
    <span style="color:var(--accent);font-weight:800;font-size:1.1rem;">${total}점</span></div>`;
  document.getElementById('ocNext').style.display='none';
  document.getElementById('resultOverlay').classList.add('visible');
  updateFFI();
}

// ═══════════════════════════════════════════════════════════
// FFI
// ═══════════════════════════════════════════════════════════
function updateFFI() {
  const all = EXERCISES.filter(e=>exScores[e.id]!==undefined);
  if (!all.length) return;
  const total = Math.round(all.reduce((a,e)=>a+exScores[e.id],0)/all.length);
  document.getElementById('ffiVal').textContent = total;
  const arc = document.getElementById('ffiArc');
  arc.style.strokeDashoffset = 207.3 - (total/100)*207.3;

  const zones = ['upper','mid','lower','neck'];
  const labels = ['상부 (눈/이마)','중부 (볼/팔자)','하부 (입꼬리)','목/턱'];
  document.getElementById('ffiDomains').innerHTML = zones.map((z,i)=>{
    const exs = EXERCISES.filter(e=>e.zone===z&&exScores[e.id]!==undefined);
    const s = exs.length ? Math.round(exs.reduce((a,e)=>a+exScores[e.id],0)/exs.length) : null;
    const col = s>=75?'var(--accent3)':s>=55?'var(--accent4)':'var(--danger)';
    return `<div style="margin-bottom:7px;">
      <div style="display:flex;justify-content:space-between;font-size:.68rem;margin-bottom:2px;">
        <span style="color:var(--dim);">${labels[i]}</span>
        <span style="font-weight:700;color:${col}">${s??'—'}</span>
      </div>
      <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
        <div style="width:${s||0}%;height:100%;background:${col};border-radius:2px;transition:width .4s;"></div>
      </div>
    </div>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════
function saveAssessToHistory() {
  const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'{"assess":[],"exercise":[]}');
  hist.assess.push({ date: new Date().toISOString(), zones: {...zoneScores} });
  if (hist.assess.length > 30) hist.assess = hist.assess.slice(-30);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
}

function saveExToHistory(score) {
  const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'{"assess":[],"exercise":[]}');
  const ex = EXERCISES[exIdx];
  hist.exercise.push({ date: new Date().toISOString(), exId: ex.id, exName: ex.name, score });
  if (hist.exercise.length > 100) hist.exercise = hist.exercise.slice(-100);
  localStorage.setItem(HIST_KEY, JSON.stringify(hist));
}

function renderHistory() {
  const hist = JSON.parse(localStorage.getItem(HIST_KEY)||'{"assess":[],"exercise":[]}');

  // Assess history
  const aEl = document.getElementById('histAssess');
  if (!hist.assess.length) { aEl.textContent = '평가 기록 없음'; }
  else {
    aEl.innerHTML = `<div class="hist-list">${hist.assess.slice().reverse().map(r => {
      const d = new Date(r.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
      const zones = r.zones;
      const bars = Object.entries(zones).map(([z,s])=>{
        const col=s>=75?'#34d399':s>=55?'#fbbf24':'#f87171';
        return `<div class="hist-hbar-wrap">
          <span class="hist-hbar-lbl">${{upper:'상부',mid:'중부',lower:'하부',neck:'목/턱'}[z]}</span>
          <div class="hist-hbar"><div class="hist-hbar-fill" style="width:${s||0}%;background:${col};"></div></div>
          <span style="font-size:.65rem;min-width:28px;text-align:right;color:${col}">${s??'—'}</span>
        </div>`;
      }).join('');
      const avg = Math.round(Object.values(zones).filter(Boolean).reduce((a,b)=>a+b,0)/4);
      return `<div class="hist-row">
        <span class="hist-date">${dateStr}</span>
        <div class="hist-bars">${bars}</div>
        <div class="hist-total">${avg}</div>
      </div>`;
    }).join('')}</div>`;
  }

  // Exercise history (grouped by exId, show trend)
  const fEl = document.getElementById('histFFI');
  if (!hist.exercise.length) { fEl.textContent = '운동 기록 없음'; }
  else {
    // Group by exId
    const byEx = {};
    hist.exercise.forEach(r => {
      if (!byEx[r.exId]) byEx[r.exId] = {name:r.exName, scores:[]};
      byEx[r.exId].scores.push({date:r.date, score:r.score});
    });
    fEl.innerHTML = Object.entries(byEx).map(([id,{name,scores}]) => {
      const latest = scores[scores.length-1].score;
      const trend  = scores.length>1 ? latest-scores[scores.length-2].score : 0;
      const col    = latest>=75?'#34d399':latest>=55?'#fbbf24':'#f87171';
      const trendTxt = trend>0?`<span style="color:#34d399">▲${trend}</span>`:trend<0?`<span style="color:#f87171">▼${Math.abs(trend)}</span>`:'—';
      const dots = scores.slice(-8).map(s=>{
        const c=s.score>=75?'#34d399':s.score>=55?'#fbbf24':'#f87171';
        return `<div style="width:6px;height:${Math.round(s.score/100*28)+2}px;background:${c};border-radius:2px;align-self:flex-end;"></div>`;
      }).join('');
      return `<div class="hist-row" style="align-items:center;">
        <div style="flex:1;"><div style="font-size:.82rem;font-weight:600;">${name}</div>
          <div style="font-size:.65rem;color:var(--dim);">${scores.length}회 기록</div></div>
        <div style="display:flex;gap:2px;align-items:flex-end;height:32px;margin:0 12px;">${dots}</div>
        <div style="text-align:right;min-width:60px;">
          <div style="font-size:1.1rem;font-weight:800;color:${col}">${latest}</div>
          <div style="font-size:.65rem;">${trendTxt}</div>
        </div>
      </div>`;
    }).join('');
  }
}
</script>
