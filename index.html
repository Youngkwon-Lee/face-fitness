<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FACE FITNESS — 얼굴 근육 훈련</title>
<style>
  :root {
    --bg: #0a0a12;
    --panel: #12121e;
    --border: #1e1e30;
    --accent: #f472b6;
    --accent2: #818cf8;
    --accent3: #34d399;
    --accent4: #fbbf24;
    --text: #e2e8f0;
    --text-dim: #64748b;
    --glow: rgba(244,114,182,0.35);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ── Header ── */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: linear-gradient(135deg, #0a0a12 0%, #12091e 100%);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1.3rem; font-weight: 800; letter-spacing: 3px; color: var(--accent); text-shadow: 0 0 20px var(--glow); }
  .logo span { color: var(--accent2); }
  .subtitle { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 2px; margin-top: 2px; }

  /* ── Layout ── */
  .main-grid {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    gap: 16px;
    padding: 16px;
    max-width: 1400px;
    margin: 0 auto;
  }
  @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } }

  /* ── Panel ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .panel-title {
    font-size: 0.65rem; letter-spacing: 2px; color: var(--text-dim);
    text-transform: uppercase; margin-bottom: 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 8px;
  }

  /* ── Exercise List ── */
  .exercise-list { display: flex; flex-direction: column; gap: 6px; max-height: 70vh; overflow-y: auto; }
  .exercise-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border); cursor: pointer;
    transition: all 0.2s; background: var(--bg);
  }
  .exercise-item:hover { border-color: var(--accent); background: rgba(244,114,182,0.05); }
  .exercise-item.active { border-color: var(--accent); background: rgba(244,114,182,0.12); box-shadow: 0 0 12px rgba(244,114,182,0.2); }
  .exercise-item.done { border-color: var(--accent3); background: rgba(52,211,153,0.07); }
  .ex-icon { font-size: 1.4rem; width: 32px; text-align: center; }
  .ex-info { flex: 1; }
  .ex-name { font-size: 0.85rem; font-weight: 600; }
  .ex-zone { font-size: 0.65rem; color: var(--text-dim); margin-top: 2px; }
  .ex-score { font-size: 0.8rem; font-weight: 700; }

  /* ── Camera ── */
  .camera-wrap { position: relative; }
  .video-box {
    position: relative; width: 100%; aspect-ratio: 4/3;
    border-radius: 12px; overflow: hidden;
    background: #000; border: 2px solid var(--border);
  }
  #video { position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; transform: scaleX(-1); }
  #overlay { position: absolute; top:0; left:0; width:100%; height:100%; pointer-events: none; }

  /* Phase badge */
  .phase-badge {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.7); border: 1px solid var(--accent);
    padding: 6px 18px; border-radius: 20px;
    font-size: 0.75rem; font-weight: 700; letter-spacing: 2px;
    color: var(--accent); text-shadow: 0 0 8px var(--glow);
    white-space: nowrap;
  }
  /* Asymmetry live bar */
  .asym-live {
    position: absolute; bottom: 12px; left: 12px; right: 12px;
    background: rgba(0,0,0,0.75); border-radius: 8px; padding: 8px 12px;
    display: flex; gap: 16px; align-items: center;
  }
  .asym-label { font-size: 0.65rem; color: var(--text-dim); white-space: nowrap; }
  .asym-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; position: relative; }
  .asym-bar-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent3), var(--accent));
    transition: width 0.15s;
  }
  .asym-value { font-size: 0.75rem; font-weight: 700; min-width: 36px; text-align: right; }

  /* ── Controls ── */
  .controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }
  .btn {
    padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer;
    font-size: 0.85rem; font-weight: 700; letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #ec4899; box-shadow: 0 0 20px var(--glow); }
  .btn-secondary { background: var(--border); color: var(--text); }
  .btn-secondary:hover { background: #2a2a40; }
  .btn-full { background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%); color: #fff; flex: 1; }
  .btn-full:hover { box-shadow: 0 0 24px rgba(129,140,248,0.4); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Exercise Detail ── */
  .ex-detail { margin-bottom: 14px; }
  .ex-detail-name { font-size: 1.1rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .ex-detail-muscle { font-size: 0.7rem; color: var(--accent2); margin-bottom: 6px; letter-spacing: 1px; }
  .ex-detail-desc { font-size: 0.8rem; color: var(--text-dim); line-height: 1.5; }
  .ex-detail-instruction {
    margin-top: 10px; padding: 10px; border-radius: 8px;
    background: rgba(244,114,182,0.08); border-left: 3px solid var(--accent);
    font-size: 0.8rem; line-height: 1.6; color: var(--text);
  }

  /* ── Timer ── */
  .timer-display {
    text-align: center; margin: 10px 0;
    font-size: 3rem; font-weight: 800;
    color: var(--accent); text-shadow: 0 0 30px var(--glow);
    font-variant-numeric: tabular-nums;
    letter-spacing: -2px;
  }
  .timer-label { font-size: 0.65rem; color: var(--text-dim); text-align: center; letter-spacing: 2px; margin-bottom: 4px; }
  .progress-bar {
    width: 100%; height: 6px; background: var(--border);
    border-radius: 3px; overflow: hidden; margin-top: 6px;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.1s linear;
  }

  /* ── Metrics ── */
  .metrics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-card {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; text-align: center;
  }
  .metric-val { font-size: 1.2rem; font-weight: 800; color: var(--accent); }
  .metric-lbl { font-size: 0.6rem; color: var(--text-dim); margin-top: 2px; letter-spacing: 1px; }

  /* ── FFI Score ── */
  .ffi-ring-wrap { display: flex; justify-content: center; margin: 10px 0; }
  .ffi-ring { position: relative; width: 100px; height: 100px; }
  .ffi-ring svg { transform: rotate(-90deg); }
  .ffi-ring-text {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    text-align: center;
  }
  .ffi-ring-val { font-size: 1.6rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .ffi-ring-max { font-size: 0.65rem; color: var(--text-dim); }

  .domain-bar { margin-bottom: 8px; }
  .domain-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .domain-name { font-size: 0.7rem; color: var(--text-dim); }
  .domain-score { font-size: 0.7rem; font-weight: 700; color: var(--accent); }
  .domain-track { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .domain-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s; }

  /* ── Zone tabs ── */
  .zone-tabs { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
  .zone-tab {
    padding: 5px 10px; border-radius: 6px; border: 1px solid var(--border);
    font-size: 0.65rem; cursor: pointer; background: var(--bg);
    transition: all 0.15s;
  }
  .zone-tab:hover { border-color: var(--accent); }
  .zone-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* ── Result overlay ── */
  .result-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.88);
    display: none; z-index: 200; align-items: center; justify-content: center;
  }
  .result-overlay.visible { display: flex; }
  .result-card {
    background: var(--panel); border: 1px solid var(--accent);
    border-radius: 16px; padding: 28px; max-width: 500px; width: 90%;
    box-shadow: 0 0 60px rgba(244,114,182,0.3);
  }
  .result-title { font-size: 1.4rem; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
  .result-subtitle { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 20px; }
  .result-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  .result-row:last-child { border-bottom: none; }
  .result-key { color: var(--text-dim); }
  .result-val { font-weight: 700; }
  .result-val.good { color: var(--accent3); }
  .result-val.ok { color: var(--accent4); }
  .result-val.bad { color: #f87171; }

  .rep-counter {
    font-size: 1rem; font-weight: 700; color: var(--accent2);
    text-align: center; margin: 6px 0;
  }
  .phase-prompt {
    font-size: 1.1rem; font-weight: 800; text-align: center;
    padding: 8px; border-radius: 8px; margin: 8px 0;
    background: rgba(244,114,182,0.1);
    color: var(--accent); letter-spacing: 2px;
    min-height: 40px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .badge-zone {
    display: inline-block; padding: 2px 7px; border-radius: 4px;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; margin-right: 4px;
  }
  .zone-upper { background: rgba(129,140,248,0.2); color: var(--accent2); }
  .zone-mid { background: rgba(244,114,182,0.2); color: var(--accent); }
  .zone-lower { background: rgba(251,191,36,0.2); color: var(--accent4); }
  .zone-neck { background: rgba(52,211,153,0.2); color: var(--accent3); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">FACE <span>FITNESS</span></div>
    <div class="subtitle">FACIAL MUSCLE TRAINING · SYMMETRY ANALYSIS</div>
  </div>
  <div style="display:flex;gap:10px;align-items:center">
    <div id="ffiHeaderScore" style="font-size:1.1rem;font-weight:800;color:var(--accent)">FFI —</div>
    <button class="btn btn-full" onclick="startFullProgram()" id="fullProgramBtn" style="font-size:0.75rem;padding:8px 16px;">FULL PROGRAM</button>
  </div>
</header>

<div class="main-grid">
  <!-- Left: Exercise list -->
  <div class="panel">
    <div class="panel-title">운동 목록 (15)</div>
    <div class="zone-tabs" id="zoneTabs">
      <div class="zone-tab active" onclick="filterZone('all',this)">전체</div>
      <div class="zone-tab" onclick="filterZone('upper',this)">상부</div>
      <div class="zone-tab" onclick="filterZone('mid',this)">중부</div>
      <div class="zone-tab" onclick="filterZone('lower',this)">하부</div>
      <div class="zone-tab" onclick="filterZone('neck',this)">목/턱</div>
    </div>
    <div class="exercise-list" id="exerciseList"></div>
  </div>

  <!-- Center: Camera + controls -->
  <div>
    <div class="camera-wrap">
      <div class="video-box">
        <video id="video" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div class="phase-badge" id="phaseBadge">카메라 시작 →</div>
        <div class="asym-live" id="asymLive" style="display:none">
          <span class="asym-label">좌우 비대칭</span>
          <div class="asym-bar-wrap"><div class="asym-bar-fill" id="asymBarFill" style="width:50%"></div></div>
          <span class="asym-value" id="asymVal">—</span>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn btn-primary" id="camBtn" onclick="startCamera()">카메라 시작</button>
      <button class="btn btn-primary" id="startBtn" onclick="startExercise()" disabled>운동 시작</button>
      <button class="btn btn-secondary" id="stopBtn" onclick="stopExercise()" disabled>정지</button>
    </div>
    <!-- Exercise detail -->
    <div class="panel" style="margin-top:12px" id="exerciseDetail">
      <div class="panel-title">운동 안내</div>
      <div id="detailContent" style="color:var(--text-dim);font-size:0.8rem;">왼쪽에서 운동을 선택하세요.</div>
    </div>
  </div>

  <!-- Right: Metrics + FFI -->
  <div style="display:flex;flex-direction:column;gap:12px">
    <!-- Timer -->
    <div class="panel">
      <div class="panel-title">타이머</div>
      <div class="timer-label" id="timerLabel">대기 중</div>
      <div class="timer-display" id="timerDisplay">0:00</div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="phase-prompt" id="phasePrompt"></div>
      <div class="rep-counter" id="repCounter"></div>
    </div>

    <!-- Live metrics -->
    <div class="panel">
      <div class="panel-title">실시간 측정</div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-val" id="metSmileL">—</div>
          <div class="metric-lbl">좌 입꼬리 상승</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metSmileR">—</div>
          <div class="metric-lbl">우 입꼬리 상승</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metBrowL">—</div>
          <div class="metric-lbl">좌 눈썹 상승</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metBrowR">—</div>
          <div class="metric-lbl">우 눈썹 상승</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metEyeL">—</div>
          <div class="metric-lbl">좌 눈 개방도</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metEyeR">—</div>
          <div class="metric-lbl">우 눈 개방도</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metJaw">—</div>
          <div class="metric-lbl">입 개방도</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="metAsym">—</div>
          <div class="metric-lbl">대칭 점수</div>
        </div>
      </div>
    </div>

    <!-- FFI Score -->
    <div class="panel">
      <div class="panel-title">FFI 점수</div>
      <div class="ffi-ring-wrap">
        <div class="ffi-ring">
          <svg width="100" height="100" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="42" fill="none" stroke="var(--border)" stroke-width="8"/>
            <circle cx="50" cy="50" r="42" fill="none" stroke="url(#ffiGrad)" stroke-width="8"
              stroke-linecap="round" stroke-dasharray="263.9" id="ffiArc"
              stroke-dashoffset="263.9"/>
            <defs>
              <linearGradient id="ffiGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f472b6"/>
                <stop offset="100%" stop-color="#818cf8"/>
              </linearGradient>
            </defs>
          </svg>
          <div class="ffi-ring-text">
            <div class="ffi-ring-val" id="ffiScoreVal">—</div>
            <div class="ffi-ring-max">/100</div>
          </div>
        </div>
      </div>
      <div id="ffiDomains">
        <div style="color:var(--text-dim);font-size:0.75rem;text-align:center">운동 완료 후 측정됩니다</div>
      </div>
    </div>
  </div>
</div>

<!-- Result overlay -->
<div class="result-overlay" id="resultOverlay">
  <div class="result-card">
    <div class="result-title" id="resultTitle">운동 완료</div>
    <div class="result-subtitle" id="resultSubtitle">측정 결과</div>
    <div id="resultRows"></div>
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeResult()">닫기</button>
      <button class="btn btn-primary" style="flex:1" id="resultNextBtn" onclick="seqNext()">다음 운동 →</button>
    </div>
  </div>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════════════════════
// EXERCISE DATABASE
// ══════════════════════════════════════════════
const EXERCISES = [
  // UPPER FACE
  {id:'brow_press',    icon:'🤨', zone:'upper', name:'이마 저항 운동',    nameEn:'Brow Press',
   muscle:'전두근 (Frontalis)',
   desc:'이마 주름을 줄이고 눈썹 처짐을 예방합니다.',
   instruction:'손가락을 눈썹 위에 가로로 얹고, 눈썹을 위로 올리려 하면서 손가락으로 저항합니다. 이마 근육만 사용, 이마에 주름이 생기지 않도록.',
   duration:30, sets:3, holdSec:5, phase:'resist',
   measure:'browRise', targetMuscle:'frontalis'},

  {id:'eye_v',         icon:'👁', zone:'upper', name:'V 눈 운동',          nameEn:'The V',
   muscle:'안륜근 (Orbicularis Oculi)',
   desc:'눈가 주름 및 눈꺼풀 처짐에 효과적입니다.',
   instruction:'검지를 바깥 눈꼬리에, 중지를 눈썹 끝에 살짝 대고 바깥쪽으로 살짝 당깁니다. 그 상태에서 아래 눈꺼풀을 위로 올립니다. 윗 눈꺼풀은 움직이지 않도록.',
   duration:30, sets:3, holdSec:3, phase:'squint',
   measure:'eyeAperture', targetMuscle:'orbicularis_oculi'},

  {id:'lower_lid',     icon:'👀', zone:'upper', name:'하안검 올리기',      nameEn:'Lower Lid Lift',
   muscle:'안륜근 하부 (Orbicularis Oculi — palpebral)',
   desc:'아래 눈꺼풀을 강화하여 눈 아래 처짐을 개선합니다.',
   instruction:'눈을 정면으로 응시한 채, 위 눈꺼풀은 고정하고 아래 눈꺼풀만 위로 살짝 올립니다. 눈을 찡그리지 않도록 주의.',
   duration:20, sets:3, holdSec:2, phase:'squint',
   measure:'eyeAperture', targetMuscle:'orbicularis_lower'},

  // MID FACE
  {id:'cheek_lifter',  icon:'🍎', zone:'mid', name:'볼 올리기',           nameEn:'Cheek Lifter',
   muscle:'광대근 (Zygomaticus Major/Minor)',
   desc:'볼의 볼륨감과 탄력을 높이는 핵심 운동입니다. (Northwestern 2018 연구 기반)',
   instruction:'입을 O 모양으로 벌리고, 입꼬리를 위로 올려 웃는 표정을 만듭니다. 볼 근육을 눈 쪽으로 끌어올리는 느낌으로. 검지로 볼을 살짝 눌러 저항을 줄 수 있습니다.',
   duration:40, sets:3, holdSec:5, phase:'smile',
   measure:'smileRise', targetMuscle:'zygomaticus'},

  {id:'nasolabial',    icon:'✨', zone:'mid', name:'팔자주름 지우기',      nameEn:'Nasolabial Eraser',
   muscle:'상순거근 (Levator Labii Superioris)',
   desc:'팔자주름 부위 근육을 강화하여 주름을 완화합니다.',
   instruction:'검지를 팔자주름 위에 살짝 얹습니다. 코끝 옆 근육을 위로 끌어올리며 미세한 "사나운 표정"을 만듭니다. 손가락으로 저항을 주면서 근육을 끌어올립니다.',
   duration:30, sets:3, holdSec:5, phase:'snarl',
   measure:'smileRise', targetMuscle:'lls'},

  {id:'puffer',        icon:'🐡', zone:'mid', name:'볼 공기 운동',         nameEn:'The Puffer',

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
window.onload = () => {
  renderExerciseList('all');
  selectExercise(0);
};

function renderExerciseList(zone) {
  const list = document.getElementById('exerciseList');
  list.innerHTML = '';
  EXERCISES.forEach((ex, i) => {
    if (zone !== 'all' && ex.zone !== zone) return;
    const div = document.createElement('div');
    div.className = 'exercise-item' + (i === currentExIdx ? ' active' : '') +
                    (exerciseScores[ex.id] !== undefined ? ' done' : '');
    div.dataset.idx = i;
    const zoneClass = `zone-${ex.zone}`;
    const scoreHtml = exerciseScores[ex.id] !== undefined
      ? `<span class="ex-score" style="color:${scoreColor(exerciseScores[ex.id])}">${Math.round(exerciseScores[ex.id])}</span>`
      : '';
    div.innerHTML = `<span class="ex-icon">${ex.icon}</span>
      <div class="ex-info">
        <div class="ex-name">${ex.name}</div>
        <div class="ex-zone"><span class="badge-zone ${zoneClass}">${zoneLabel(ex.zone)}</span>${ex.muscle}</div>
      </div>${scoreHtml}`;
    div.onclick = () => selectExercise(i);
    list.appendChild(div);
  });
}

function zoneLabel(z) {
  return {upper:'상부', mid:'중부', lower:'하부', neck:'목/턱'}[z] || z;
}
function scoreColor(s) {
  if (s >= 80) return 'var(--accent3)';
  if (s >= 60) return 'var(--accent4)';
  return '#f87171';
}

function filterZone(zone, el) {
  document.querySelectorAll('.zone-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  renderExerciseList(zone);
}

function selectExercise(idx) {
  currentExIdx = idx;
  const ex = EXERCISES[idx];
  renderExerciseList(document.querySelector('.zone-tab.active')?.textContent === '전체' ? 'all' :
    ['upper','mid','lower','neck'][['상부','중부','하부','목/턱'].indexOf(document.querySelector('.zone-tab.active')?.textContent)] || 'all');

  const detail = document.getElementById('detailContent');
  detail.innerHTML = `
    <div class="ex-detail">
      <div class="ex-detail-name">${ex.icon} ${ex.name}</div>
      <div class="ex-detail-muscle">${ex.muscle}</div>
      <div class="ex-detail-desc">${ex.desc}</div>
      <div class="ex-detail-instruction">${ex.instruction}</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
      <div style="font-size:0.7rem;color:var(--text-dim)">⏱ ${ex.duration}초/세트 · ${ex.sets}세트</div>
      <div style="font-size:0.7rem;color:var(--text-dim)">⏸ ${ex.holdSec}초 유지</div>
    </div>`;

  document.getElementById('startBtn').disabled = !cameraRunning || testState !== 'idle';
}

// ══════════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════════
async function startCamera() {
  document.getElementById('camBtn').disabled = true;
  document.getElementById('camBtn').textContent = '로딩 중...';

  const video = document.getElementById('video');
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:640,height:480}});
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  video.play();
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  await loadFaceMesh();
  cameraRunning = true;
  document.getElementById('camBtn').textContent = '카메라 ON';
  document.getElementById('phaseBadge').textContent = '운동을 선택하고 시작하세요';
  document.getElementById('asymLive').style.display = '';
  document.getElementById('startBtn').disabled = false;
  requestAnimationFrame(frameLoop);
}

function resizeCanvas() {
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  canvas.width = video.offsetWidth;
  canvas.height = video.offsetHeight;
}

async function loadFaceMesh() {
  if (faceMeshLoaded || faceMeshLoading) return;
  faceMeshLoading = true;
  faceMeshModel = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
  faceMeshModel.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
  faceMeshModel.onResults(onFaceResults);
  await faceMeshModel.initialize();
  faceMeshLoaded = true;
  faceMeshLoading = false;
}

let lastFaceResults = null;
function onFaceResults(results) { lastFaceResults = results; }

async function frameLoop() {
  if (!cameraRunning) return;
  const video = document.getElementById('video');
  if (faceMeshLoaded && video.readyState >= 2) {
    await faceMeshModel.send({image: video});
    if (lastFaceResults?.multiFaceLandmarks?.[0]) {
      const lm = lastFaceResults.multiFaceLandmarks[0];
      drawFace(lm);
      analyzeFace(lm);
    }
  }
  requestAnimationFrame(frameLoop);
}

// ══════════════════════════════════════════════
// FACE DRAWING
// ══════════════════════════════════════════════
const FM_L_EYE=[[33,7],[7,163],[163,144],[144,145],[145,153],[153,154],[154,155],[155,133],[133,173],[173,157],[157,158],[158,159],[159,160],[160,161],[161,246],[246,33]];
const FM_R_EYE=[[263,249],[249,390],[390,373],[373,374],[374,380],[380,381],[381,382],[382,362],[362,398],[398,384],[384,385],[385,386],[386,387],[387,388],[388,466],[466,263]];
const FM_L_BROW=[[46,53],[53,52],[52,65],[65,55],[55,70],[70,63],[63,105],[105,66],[66,107]];
const FM_R_BROW=[[276,283],[283,282],[282,295],[295,285],[285,300],[300,293],[293,334],[334,296],[296,336]];
const FM_LIPS=[[61,146],[146,91],[91,181],[181,84],[84,17],[17,314],[314,405],[405,321],[321,375],[375,291],[291,308],[308,324],[324,318],[318,402],[402,317],[317,14],[14,87],[87,178],[178,88],[88,95],[95,78],[78,191],[191,80],[80,81],[81,82],[82,13],[13,312],[312,311],[311,310],[310,415],[415,308],[308,291],[291,375],[375,321],[321,405],[405,314],[314,17],[17,84],[84,181],[181,91],[91,146],[146,61]];
const FM_NOSE=[[168,6],[6,197],[197,195],[195,5],[5,4],[4,1],[1,19],[19,94],[94,2],[2,164],[164,0],[0,11],[11,12],[12,13]];

function drawFace(lm) {
  const canvas = document.getElementById('overlay');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  const lx = i => (1 - lm[i].x) * W;
  const ly = i => lm[i].y * H;

  // Convex hull silhouette
  const pts = [];
  for (let i = 0; i < 468; i++) pts.push({x:lx(i), y:ly(i)});
  pts.sort((a,b) => a.x!==b.x ? a.x-b.x : a.y-b.y);
  const cross = (O,A,B) => (A.x-O.x)*(B.y-O.y)-(A.y-O.y)*(B.x-O.x);
  const hull = [];
  for (const p of pts) { while(hull.length>=2 && cross(hull[hull.length-2],hull[hull.length-1],p)<=0) hull.pop(); hull.push(p); }
  const lower = hull.length+1;
  for (let i=pts.length-1;i>=0;i--) { const p=pts[i]; while(hull.length>=lower && cross(hull[hull.length-2],hull[hull.length-1],p)<=0) hull.pop(); hull.push(p); }
  hull.pop();
  ctx.save();
  ctx.strokeStyle='rgba(244,114,182,0.5)'; ctx.lineWidth=2; ctx.shadowBlur=10; ctx.shadowColor='#f472b6';
  ctx.beginPath(); hull.forEach((p,n)=>n===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y)); ctx.closePath(); ctx.stroke();
  ctx.restore();

  // Dense mesh
  if (!faceEdgeCache) {
    faceEdgeCache = [];
    const THRESH = 0.08;
    for (let i=0;i<468;i++) for (let j=i+1;j<468;j++) {
      const dx=lm[i].x-lm[j].x, dy=lm[i].y-lm[j].y;
      if (dx*dx+dy*dy < THRESH*THRESH) faceEdgeCache.push([i,j]);
    }
  }
  ctx.save();
  ctx.strokeStyle='rgba(244,114,182,0.15)'; ctx.lineWidth=0.6; ctx.shadowBlur=0;
  ctx.beginPath();
  faceEdgeCache.forEach(([a,b])=>{ ctx.moveTo(lx(a),ly(a)); ctx.lineTo(lx(b),ly(b)); });
  ctx.stroke();
  ctx.restore();

  // Feature edges (eyes, brows, lips) — brighter
  function drawEdges(edges, color, lw) {
    ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=lw; ctx.shadowBlur=4; ctx.shadowColor=color;
    ctx.beginPath();
    edges.forEach(([a,b])=>{ ctx.moveTo(lx(a),ly(a)); ctx.lineTo(lx(b),ly(b)); });
    ctx.stroke(); ctx.restore();
  }
  drawEdges(FM_L_EYE, 'rgba(129,140,248,0.85)', 1.2);
  drawEdges(FM_R_EYE, 'rgba(129,140,248,0.85)', 1.2);
  drawEdges(FM_L_BROW, 'rgba(251,191,36,0.7)', 1.1);
  drawEdges(FM_R_BROW, 'rgba(251,191,36,0.7)', 1.1);
  drawEdges(FM_LIPS, 'rgba(244,114,182,0.8)', 1.3);
  drawEdges(FM_NOSE, 'rgba(52,211,153,0.6)', 0.9);

  // Landmark dots
  ctx.save(); ctx.fillStyle='rgba(244,114,182,0.7)';
  ctx.beginPath();
  for (let i=0;i<468;i++) { const x=lx(i),y=ly(i); ctx.moveTo(x+2,y); ctx.arc(x,y,2,0,Math.PI*2); }
  ctx.fill(); ctx.restore();

  // Key landmark highlights
  const keyPts = [
    {i:61, c:'#f472b6', label:'L입꼬리'}, {i:291, c:'#f472b6', label:'R입꼬리'},
    {i:66, c:'#fbbf24', label:'L눈썹'}, {i:296, c:'#fbbf24', label:'R눈썹'},
    {i:33, c:'#818cf8', label:'L눈'}, {i:263, c:'#818cf8', label:'R눈'},
  ];
  keyPts.forEach(({i, c}) => {
    ctx.save(); ctx.fillStyle=c; ctx.shadowBlur=8; ctx.shadowColor=c;
    ctx.beginPath(); ctx.arc(lx(i), ly(i), 4, 0, Math.PI*2); ctx.fill(); ctx.restore();
  });

  // Asymmetry guide lines
  if (testState === 'running') {
    const midX = (lx(61)+lx(291))/2;
    ctx.save(); ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(midX, 0); ctx.lineTo(midX, H); ctx.stroke();
    ctx.restore();
  }
}

// ══════════════════════════════════════════════
// FACE ANALYSIS
// ══════════════════════════════════════════════
function faceD(lm, a, b) {
  const dx=lm[a].x-lm[b].x, dy=lm[a].y-lm[b].y;
  return Math.sqrt(dx*dx+dy*dy);
}

function analyzeFace(lm) {
  // EAR (eye aspect ratio)
  const earL = (faceD(lm,160,144)+faceD(lm,158,153)) / (2*faceD(lm,33,133)+1e-5);
  const earR = (faceD(lm,387,373)+faceD(lm,385,380)) / (2*faceD(lm,263,362)+1e-5);

  // Mouth metrics
  const mouthH = faceD(lm, 13, 14); // vertical open
  const mouthW = faceD(lm, 61, 291); // width

  // Brow height (relative to eye)
  const browL_y = (lm[66].y + lm[105].y) / 2;
  const browR_y = (lm[296].y + lm[334].y) / 2;
  const eyeL_y  = lm[33].y;
  const eyeR_y  = lm[263].y;
  const browRiseL = eyeL_y - browL_y;
  const browRiseR = eyeR_y - browR_y;

  // Corner rise (relative to mouth center)
  const mouthCenterY = (lm[13].y + lm[14].y) / 2;
  const cornerRiseL = mouthCenterY - lm[61].y;
  const cornerRiseR = mouthCenterY - lm[291].y;

  // Baseline accumulation
  if (!baselineDone && baseline.n < BASELINE_FRAMES) {
    baseline.leftCornerY  = (baseline.leftCornerY  * baseline.n + lm[61].y)  / (baseline.n+1);
    baseline.rightCornerY = (baseline.rightCornerY * baseline.n + lm[291].y) / (baseline.n+1);
    baseline.leftBrowY    = (baseline.leftBrowY    * baseline.n + browL_y)   / (baseline.n+1);
    baseline.rightBrowY   = (baseline.rightBrowY   * baseline.n + browR_y)   / (baseline.n+1);
    baseline.leftEAR      = (baseline.leftEAR      * baseline.n + earL)      / (baseline.n+1);
    baseline.rightEAR     = (baseline.rightEAR     * baseline.n + earR)      / (baseline.n+1);
    baseline.jawH         = (baseline.jawH         * baseline.n + mouthH)    / (baseline.n+1);
    baseline.n++;
    if (baseline.n >= BASELINE_FRAMES) { baselineDone = true; }
    document.getElementById('phaseBadge').textContent = `기준값 측정 중... ${Math.round(baseline.n/BASELINE_FRAMES*100)}%`;
  }

  // Relative metrics
  const relCornerL = baseline.leftCornerY  - lm[61].y;  // positive = corner rose
  const relCornerR = baseline.rightCornerY - lm[291].y;
  const relBrowL   = baseline.leftBrowY    - browL_y;   // positive = brow rose
  const relBrowR   = baseline.rightBrowY   - browR_y;
  const relEarL    = earL - baseline.leftEAR;
  const relEarR    = earR - baseline.rightEAR;
  const relJaw     = mouthH - baseline.jawH;

  // Asymmetry score (0=perfect, higher=more asymmetric)
  const smileAsym  = Math.abs(relCornerL - relCornerR);
  const browAsym   = Math.abs(relBrowL   - relBrowR);
  const earAsym    = Math.abs(earL - earR);
  const totalAsym  = (smileAsym + browAsym + earAsym) / 3;
  const symScore   = Math.max(0, 100 - totalAsym * 2000);

  // Update UI
  const fmt = v => (v > 0 ? '+' : '') + (v * 100).toFixed(1);
  document.getElementById('metSmileL').textContent = fmt(relCornerL);
  document.getElementById('metSmileR').textContent = fmt(relCornerR);
  document.getElementById('metBrowL').textContent  = fmt(relBrowL);
  document.getElementById('metBrowR').textContent  = fmt(relBrowR);
  document.getElementById('metEyeL').textContent   = earL.toFixed(3);
  document.getElementById('metEyeR').textContent   = earR.toFixed(3);
  document.getElementById('metJaw').textContent    = fmt(relJaw);
  document.getElementById('metAsym').textContent   = Math.round(symScore);

  // Asymmetry bar
  const asymPct = Math.min(100, totalAsym * 2000);
  document.getElementById('asymBarFill').style.width = Math.max(2, 100 - asymPct) + '%';
  document.getElementById('asymVal').textContent = Math.round(symScore);

  // Push to measurement buffer if running
  if (testState === 'running') {
    const ex = EXERCISES[currentExIdx];
    let val = 0;
    if (ex.measure === 'smileRise')         val = (relCornerL + relCornerR) / 2;
    else if (ex.measure === 'browRise')     val = (relBrowL + relBrowR) / 2;
    else if (ex.measure === 'eyeAperture')  val = (earL + earR) / 2;
    else if (ex.measure === 'mouthWidth')   val = mouthW;
    else if (ex.measure === 'mouthCornerAngle') val = (relCornerL + relCornerR) / 2;
    else if (ex.measure === 'jawOpen')      val = relJaw;
    measureBuf.push({val, symScore, relCornerL, relCornerR, relBrowL, relBrowR, earL, earR, relJaw});
  }
}

// ══════════════════════════════════════════════
// EXERCISE FLOW
// ══════════════════════════════════════════════
function startExercise() {
  if (!cameraRunning || testState !== 'idle') return;
  if (!baselineDone) { alert('기준값 측정 중입니다. 잠시 기다려주세요.'); return; }
  const ex = EXERCISES[currentExIdx];
  measureBuf.length = 0;
  repCount = 0; lastRepPeak = false;
  currentSetNum = 1;
  testDuration = ex.duration * 1000;
  testState = 'countdown';

  document.getElementById('startBtn').disabled = true;
  document.getElementById('stopBtn').disabled = false;

  // 3-second countdown
  let cd = 3;
  document.getElementById('phaseBadge').textContent = `${ex.name} 준비 ${cd}...`;
  document.getElementById('phasePrompt').textContent = ex.instruction.slice(0,40) + '...';
  const cdInterval = setInterval(() => {
    cd--;
    if (cd <= 0) {
      clearInterval(cdInterval);
      beginSet();
    } else {
      document.getElementById('phaseBadge').textContent = `${cd}...`;
    }
  }, 1000);
}

function beginSet() {
  const ex = EXERCISES[currentExIdx];
  testState = 'running';
  testStartTime = Date.now();
  document.getElementById('timerLabel').textContent = `세트 ${currentSetNum} / ${ex.sets}`;
  document.getElementById('phaseBadge').textContent = `${ex.icon} ${ex.name}`;

  timerInterval = setInterval(updateTimer, 100);
}

function updateTimer() {
  const ex = EXERCISES[currentExIdx];
  const elapsed = Date.now() - testStartTime;
  const remaining = Math.max(0, testDuration - elapsed);
  const pct = ((testDuration - remaining) / testDuration) * 100;

  const secs = Math.ceil(remaining / 1000);
  document.getElementById('timerDisplay').textContent = `${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
  document.getElementById('progressFill').style.width = pct + '%';

  // Phase prompt
  const phase = ex.phase;
  const frac  = elapsed / testDuration;
  let prompt = '';
  if (phase === 'smile') {
    prompt = frac < 0.3 ? '자연스럽게...' : frac < 0.7 ? '😊 활짝 웃어보세요!' : '천천히 이완...';
  } else if (phase === 'resist') {
    prompt = `이마 올리고 → 저항 유지 ${ex.holdSec}초`;
  } else if (phase === 'squint') {
    prompt = frac < 0.5 ? '👁 아래 눈꺼풀 올리기' : '천천히 이완...';
  } else if (phase === 'puff') {
    prompt = '볼에 공기 → 좌↔우 이동';
  } else if (phase === 'snarl') {
    prompt = '코 옆 근육 올리기 ↑';
  } else if (phase === 'chin') {
    prompt = frac < 0.5 ? '턱 운동 유지' : '천천히 이완...';
  } else if (phase === 'vowel') {
    const v = ['아','에','이','오','우'][Math.floor(frac * 5) % 5];
    prompt = `"${v}" — 크고 과장되게`;
  }
  document.getElementById('phasePrompt').textContent = prompt;

  // Rep counting (threshold crossing)
  if (measureBuf.length > 0) {
    const last = measureBuf[measureBuf.length-1].val;
    const isHigh = last > 0.003;
    if (isHigh && !lastRepPeak) { repCount++; lastRepPeak = true; }
    else if (!isHigh) lastRepPeak = false;
    document.getElementById('repCounter').textContent = `반복 ${repCount}회`;
  }

  if (elapsed >= testDuration) {
    clearInterval(timerInterval);
    onSetComplete();
  }
}

function onSetComplete() {
  const ex = EXERCISES[currentExIdx];
  if (currentSetNum < ex.sets) {
    testState = 'idle';
    currentSetNum++;
    let restCountdown = 15;
    document.getElementById('phaseBadge').textContent = `휴식 ${restCountdown}초`;
    document.getElementById('timerLabel').textContent = `세트 ${currentSetNum-1} 완료 · 휴식`;
    document.getElementById('phasePrompt').textContent = `다음: 세트 ${currentSetNum}`;
    const restInt = setInterval(() => {
      restCountdown--;
      document.getElementById('phaseBadge').textContent = `휴식 ${restCountdown}초`;
      document.getElementById('timerDisplay').textContent = `0:${String(restCountdown).padStart(2,'0')}`;
      if (restCountdown <= 0) { clearInterval(restInt); beginSet(); }
    }, 1000);
  } else {
    testState = 'done';
    finishExercise();
  }
}

function finishExercise() {
  const ex = EXERCISES[currentExIdx];
  clearInterval(timerInterval);
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('phaseBadge').textContent = '✓ 완료';

  // Compute score
  const score = computeScore();
  exerciseScores[ex.id] = score;

  // Show result
  showResult(ex, score);
  updateFFI();
  renderExerciseList(document.querySelector('.zone-tab.active').textContent === '전체' ? 'all' :
    {상부:'upper',중부:'mid',하부:'lower','목/턱':'neck'}[document.querySelector('.zone-tab.active').textContent] || 'all');
}

function computeScore() {
  if (measureBuf.length === 0) return 50;
  const ex = EXERCISES[currentExIdx];
  const vals = measureBuf.map(m => m.val);
  const symScores = measureBuf.map(m => m.symScore);

  // Activation score: how much the target muscle moved
  const maxVal = Math.max(...vals);
  const avgVal = vals.reduce((a,b)=>a+b,0) / vals.length;
  const activationScore = Math.min(100, Math.max(0, avgVal * 2000 + 50));

  // Symmetry score
  const avgSym = symScores.reduce((a,b)=>a+b,0) / symScores.length;

  // Rep score (relative to expected)
  const expectedReps = Math.floor(ex.duration / (ex.holdSec * 2));
  const repScore = Math.min(100, (repCount / Math.max(1, expectedReps)) * 100);

  return Math.round(activationScore * 0.5 + avgSym * 0.3 + repScore * 0.2);
}

function showResult(ex, score) {
  const buf = measureBuf;
  if (buf.length === 0) return;

  const smileL = buf.map(m=>m.relCornerL);
  const smileR = buf.map(m=>m.relCornerR);
  const avgSmileL = (smileL.reduce((a,b)=>a+b,0)/smileL.length*100).toFixed(1);
  const avgSmileR = (smileR.reduce((a,b)=>a+b,0)/smileR.length*100).toFixed(1);
  const asymPct   = (Math.abs(parseFloat(avgSmileL)-parseFloat(avgSmileR))).toFixed(1);
  const avgSym    = (buf.map(m=>m.symScore).reduce((a,b)=>a+b,0)/buf.length).toFixed(0);
  const browAsymL = (buf.map(m=>m.relBrowL).reduce((a,b)=>a+b,0)/buf.length*100).toFixed(1);
  const browAsymR = (buf.map(m=>m.relBrowR).reduce((a,b)=>a+b,0)/buf.length*100).toFixed(1);

  const sc = n => n>=70?'good':n>=50?'ok':'bad';

  document.getElementById('resultTitle').textContent = `${ex.icon} ${ex.name} 완료`;
  document.getElementById('resultSubtitle').textContent = `${ex.sets}세트 × ${ex.duration}초 · 반복 ${repCount}회`;
  document.getElementById('resultRows').innerHTML = `
    <div class="result-row"><span class="result-key">FFI 점수</span><span class="result-val ${sc(score)}">${score}점</span></div>
    <div class="result-row"><span class="result-key">좌우 대칭</span><span class="result-val ${sc(avgSym)}">${avgSym}점</span></div>
    <div class="result-row"><span class="result-key">좌 입꼬리 상승</span><span class="result-val">${avgSmileL > 0 ? '+' : ''}${avgSmileL}</span></div>
    <div class="result-row"><span class="result-key">우 입꼬리 상승</span><span class="result-val">${avgSmileR > 0 ? '+' : ''}${avgSmileR}</span></div>
    <div class="result-row"><span class="result-key">비대칭 차이</span><span class="result-val ${parseFloat(asymPct)<0.5?'good':parseFloat(asymPct)<1.5?'ok':'bad'}">${asymPct}</span></div>
    <div class="result-row"><span class="result-key">눈썹 좌/우 상승</span><span class="result-val">${browAsymL > 0?'+':''}${browAsymL} / ${browAsymR > 0?'+':''}${browAsymR}</span></div>
    <div class="result-row"><span class="result-key">근육 활성화 평가</span><span class="result-val ${sc(score)}">${score>=80?'우수 💪':score>=60?'양호 👍':'보완 필요 💡'}</span></div>`;

  document.getElementById('resultNextBtn').style.display = seqMode ? '' : 'none';
  document.getElementById('resultOverlay').classList.add('visible');
}

function closeResult() {
  document.getElementById('resultOverlay').classList.remove('visible');
  testState = 'idle';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('phaseBadge').textContent = '운동 완료 — 다음 운동을 선택하세요';
  document.getElementById('timerDisplay').textContent = '0:00';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('phasePrompt').textContent = '';
  document.getElementById('repCounter').textContent = '';
}

function stopExercise() {
  clearInterval(timerInterval);
  testState = 'idle';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').disabled = true;
  document.getElementById('phaseBadge').textContent = '중지됨';
  document.getElementById('timerDisplay').textContent = '0:00';
  document.getElementById('progressFill').style.width = '0%';
  document.getElementById('phasePrompt').textContent = '';
}

// ══════════════════════════════════════════════
// FFI SCORE
// ══════════════════════════════════════════════
function updateFFI() {
  const completedIds = Object.keys(exerciseScores);
  if (completedIds.length === 0) return;

  // Domain scores
  const domainMap = {upper:[], mid:[], lower:[], neck:[]};
  EXERCISES.forEach(ex => {
    if (exerciseScores[ex.id] !== undefined) domainMap[ex.zone].push(exerciseScores[ex.id]);
  });
  const avg = arr => arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : null;
  const d1 = avg(domainMap.upper);
  const d2 = avg(domainMap.mid);
  const d3 = avg(domainMap.lower);
  const d4 = avg(domainMap.neck);
  const all = completedIds.map(id => exerciseScores[id]);
  const total = Math.round(avg(all));

  // Update ring
  const arc = document.getElementById('ffiArc');
  const circumference = 263.9;
  arc.style.strokeDashoffset = circumference - (total / 100) * circumference;
  document.getElementById('ffiScoreVal').textContent = total;
  document.getElementById('ffiHeaderScore').textContent = `FFI ${total}`;

  // Domain bars
  const domains = [
    {label:'상부 (눈/이마)', val:d1, max:20},
    {label:'중부 (볼/팔자)', val:d2, max:30},
    {label:'하부 (입꼬리)', val:d3, max:30},
    {label:'목/턱',          val:d4, max:20},
  ];
  document.getElementById('ffiDomains').innerHTML = domains.map(d => `
    <div class="domain-bar">
      <div class="domain-row">
        <span class="domain-name">${d.label}</span>
        <span class="domain-score">${d.val !== null ? Math.round(d.val) : '—'}</span>
      </div>
      <div class="domain-track">
        <div class="domain-fill" style="width:${d.val !== null ? d.val : 0}%"></div>
      </div>
    </div>`).join('');
}

// ══════════════════════════════════════════════
// SEQUENTIAL (FULL PROGRAM)
// ══════════════════════════════════════════════
function startFullProgram() {
  seqMode = true;
  seqIdx = 0;
  Object.keys(exerciseScores).forEach(k => delete exerciseScores[k]);
  document.getElementById('resultOverlay').classList.remove('visible');
  seqAdvance();
}

function seqAdvance() {
  if (seqIdx >= EXERCISES.length) { showFinalReport(); return; }
  selectExercise(seqIdx);
  closeResult();
  // Auto-start after 4s
  if (cameraRunning) {
    document.getElementById('phaseBadge').textContent = `${seqIdx+1}/${EXERCISES.length}: ${EXERCISES[seqIdx].name} 준비 중...`;
    setTimeout(() => {
      if (testState === 'idle' && baselineDone) startExercise();
    }, 4000);
  }
}

function seqNext() {
  seqIdx++;
  seqAdvance();
}

function showFinalReport() {
  seqMode = false;
  const scores = EXERCISES.map(ex => exerciseScores[ex.id] ?? null).filter(s => s !== null);
  const total = Math.round(scores.reduce((a,b)=>a+b,0)/scores.length);

  document.getElementById('resultTitle').textContent = '🏆 Full Program 완료!';
  document.getElementById('resultSubtitle').textContent = `총 ${scores.length}개 운동 완료 · FFI ${total}점`;
  document.getElementById('resultRows').innerHTML = EXERCISES.map(ex => {
    const s = exerciseScores[ex.id];
    return `<div class="result-row">
      <span class="result-key">${ex.icon} ${ex.name}</span>
      <span class="result-val ${s!==undefined?scoreColor(s).replace('var(--','').replace(')','').replace('accent3','good').replace('accent4','ok').replace('#f87171','bad'):''}">
        ${s !== undefined ? s + '점' : '—'}</span>
    </div>`;
  }).join('') + `<div class="result-row" style="border-top:2px solid var(--accent);margin-top:8px;padding-top:8px">
    <span class="result-key" style="font-weight:700;color:var(--text)">FFI 총점</span>
    <span class="result-val" style="color:var(--accent);font-size:1.1rem">${total}점 / 100</span>
  </div>`;
  document.getElementById('resultNextBtn').style.display = 'none';
  document.getElementById('resultOverlay').classList.add('visible');
  updateFFI();
}

// ══════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════
window.onerror = (msg, src, line) => console.error(`JS Error: ${msg} at ${src}:${line}`);
</script>
