      <line x1="210" y1="208" x2="207" y2="202"/>
      <line x1="218" y1="203" x2="216" y2="197"/>
      <line x1="227" y1="200" x2="226" y2="194"/>
      <line x1="236" y1="200" x2="235" y2="194"/>
      <line x1="245" y1="202" x2="245" y2="196"/>
      <line x1="254" y1="207" x2="255" y2="201"/>
      <line x1="262" y1="213" x2="264" y2="208"/>
    </g>
    <g stroke="#94a3b8" stroke-width="0.7" stroke-linecap="round" opacity="0.5">
      <line x1="208" y1="224" x2="205" y2="228"/>
      <line x1="218" y1="230" x2="216" y2="235"/>
      <line x1="228" y1="233" x2="227" y2="238"/>
      <line x1="238" y1="232" x2="238" y2="237"/>
      <line x1="248" y1="228" x2="249" y2="233"/>
      <line x1="258" y1="222" x2="260" y2="226"/>
    </g>
  </g>

  <!-- Right eye -->
  <g filter="url(#eyeGlow)">
    <path d="M 292,218 C 290,213 292,209 298,205 C 308,198 319,196 327,197 C 335,198 350,205 360,218"
      fill="none" stroke="#e2e8f0" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M 292,218 C 294,217 296,218 302,222 C 312,229 323,233 331,233 C 339,233 350,228 360,218"
