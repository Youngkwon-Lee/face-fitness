    <path d="M 291,218 C 289,213 291,208 297,204 C 307,197 319,195 327,196 C 336,197 351,204 361,218"
      fill="none" stroke="#818cf8" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <circle cx="326" cy="215" r="13" fill="url(#irisR)" opacity="0.9"/>
    <circle cx="326" cy="215" r="6" fill="#0a0f2e"/>
    <circle cx="326" cy="215" r="13" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.6"/>
    <circle cx="331" cy="210" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="321" cy="219" r="1.2" fill="white" opacity="0.3"/>
    <g stroke="#c4b5fd" stroke-width="1" stroke-linecap="round" opacity="0.8">
      <line x1="298" y1="213" x2="296" y2="208"/>
      <line x1="305" y1="207" x2="304" y2="201"/>
      <line x1="313" y1="202" x2="312" y2="196"/>
      <line x1="322" y1="200" x2="322" y2="194"/>
      <line x1="331" y1="200" x2="332" y2="194"/>
      <line x1="340" y1="202" x2="341" y2="197"/>
      <line x1="349" y1="208" x2="351" y2="202"/>
      <line x1="356" y1="215" x2="360" y2="209"/>
    </g>
    <g stroke="#94a3b8" stroke-width="0.7" stroke-linecap="round" opacity="0.5">
      <line x1="302" y1="222" x2="300" y2="226"/>
      <line x1="312" y1="228" x2="311" y2="233"/>
      <line x1="322" y1="232" x2="322" y2="237"/>
      <line x1="332" y1="232" x2="333" y2="237"/>
      <line x1="342" y1="228" x2="343" y2="233"/>
      <line x1="352" y1="222" x2="354" y2="226"/>
    </g>
  </g>

  <!-- Nose (minimal) -->
  <g stroke="#94a3b8" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M 266,308 C 263,312 262,316 264,319 C 266,322 270,323 274,320" stroke-width="1.2"/>
    <path d="M 294,308 C 297,312 298,316 296,319 C 294,322 290,323 286,320" stroke-width="1.2"/>
    <path d="M 272,320 C 276,322 284,322 288,320" stroke-width="1.0"/>
  </g>

  <!-- Lips -->
  <g fill="none" stroke-linecap="round">
    <path d="M 252,352 C 260,347 268,345 280,346 C 292,345 300,347 308,352"
      stroke="#e2d9f3" stroke-width="1.5"/>
    <path d="M 265,352 C 272,349 276,348 280,348 C 284,348 288,349 295,352"
      stroke="#c4b5fd" stroke-width="1.0" opacity="0.7"/>
    <path d="M 252,352 C 258,357 267,362 280,363 C 293,362 302,357 308,352"
      stroke="#e2d9f3" stroke-width="1.5"/>
    <path d="M 264,357 C 270,361 276,363 280,363 C 284,363 290,361 296,357"
      stroke="#a78bfa" stroke-width="0.8" opacity="0.5"/>
