    <path d="M 308,175 C 326,173 340,177 350,185" stroke-width="1.2"/>
    <path d="M 308,178 C 326,176 340,180 350,188" stroke-width="0.8"/>
    <path d="M 309,181 C 326,179 340,183 350,191" stroke-width="0.5"/>
  </g>

