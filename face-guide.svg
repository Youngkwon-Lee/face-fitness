<!-- ════════════════════════════════════════════════════ -->
<!--   SMIL ANIMATIONS                                   -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Outer ring pulse -->
<ellipse cx="280" cy="212" rx="172" ry="200" fill="none"
  stroke="#ec4899" stroke-width="1.2" opacity="0">
  <animate attributeName="opacity" values="0;0.3;0" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="rx"      values="170;180;170" dur="3s" repeatCount="indefinite"/>
  <animate attributeName="ry"      values="198;210;198" dur="3s" repeatCount="indefinite"/>
</ellipse>

<!-- Scan sweep line -->
<defs>
  <linearGradient id="sweepG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%"   stop-color="#818cf8" stop-opacity="0"/>
    <stop offset="50%"  stop-color="#c4b5fd" stop-opacity="1"/>
    <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
  </linearGradient>
</defs>
<rect x="148" y="36" width="264" height="5" fill="url(#sweepG)" opacity="0">
  <animate attributeName="y"       values="36;400;36"   dur="7s" repeatCount="indefinite" calcMode="linear"/>
  <animate attributeName="opacity" values="0;0;0.2;0.2;0" keyTimes="0;0.05;0.15;0.85;1" dur="7s" repeatCount="indefinite"/>
</rect>

<!-- Eye iris subtle pulse -->
<circle cx="215" cy="195" r="14" fill="none" stroke="#6366f1" stroke-width="1" opacity="0">
  <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
</circle>
<circle cx="345" cy="195" r="14" fill="none" stroke="#6366f1" stroke-width="1" opacity="0">
  <animate attributeName="opacity" values="0;0.6;0" dur="4s" begin="0.5s" repeatCount="indefinite"/>
</circle>

</svg>
