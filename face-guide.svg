    <path d="M 200,218 C 210,204 225,196 234,195 C 242,194 253,197 263,204 C 269,208 271,213 269,218"
      fill="none" stroke="#818cf8" stroke-width="3" opacity="0.2" stroke-linecap="round"/>
    <circle cx="234" cy="215" r="13" fill="url(#irisL)" opacity="0.9"/>
    <circle cx="234" cy="215" r="6" fill="#0a0f2e"/>
    <circle cx="234" cy="215" r="13" fill="none" stroke="#93c5fd" stroke-width="0.8" opacity="0.6"/>
    <circle cx="239" cy="210" r="2.5" fill="white" opacity="0.7"/>
    <circle cx="229" cy="219" r="1.2" fill="white" opacity="0.3"/>
    <g stroke="#c4b5fd" stroke-width="1" stroke-linecap="round" opacity="0.8">
