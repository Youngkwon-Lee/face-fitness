  <!-- Philtrum -->
  <g stroke="#94a3b8" fill="none" opacity="0.35">
    <path d="M 274,324 C 273,335 272,342 272,348" stroke-width="0.8" stroke-linecap="round"/>
    <path d="M 286,324 C 287,335 288,342 288,348" stroke-width="0.8" stroke-linecap="round"/>
