<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 440" width="560" height="440">
<defs>
  <!-- BG gradient -->
  <radialGradient id="bgG" cx="50%" cy="46%" r="68%">
    <stop offset="0%" stop-color="#0b1228"/>
    <stop offset="100%" stop-color="#020710"/>
  </radialGradient>

  <!-- Face atmospheric bloom -->
  <radialGradient id="atmG" gradientUnits="userSpaceOnUse" cx="280" cy="205" r="195">
    <stop offset="0%"   stop-color="#3730a3" stop-opacity="0.22"/>
    <stop offset="55%"  stop-color="#4338ca" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
  </radialGradient>

  <!-- Bottom floor glow -->
  <radialGradient id="floorG" gradientUnits="userSpaceOnUse" cx="280" cy="430" r="140">
    <stop offset="0%"   stop-color="#4f46e5" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
  </radialGradient>

  <!-- Scan line pattern -->
  <pattern id="sL" x="0" y="0" width="560" height="7" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="560" y2="0" stroke="#818cf8" stroke-width="0.3"/>
  </pattern>

  <!-- Glow filters -->
  <filter id="gXL"  x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="10" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gMd"  x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gSm"  x="-60%" y="-60%" width="220%" height="220%">
    <feGaussianBlur stdDeviation="3" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gPink" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gHair" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="1.8" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gEye"  x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- ── BACKGROUND ── -->
<rect width="560" height="440" fill="url(#bgG)"/>
<rect width="560" height="440" fill="url(#sL)" opacity="0.035"/>

<!-- ── ATMOSPHERIC GLOW ── -->
<ellipse cx="280" cy="205" rx="195" ry="215" fill="url(#atmG)"/>
<ellipse cx="280" cy="430" rx="140" ry="30"  fill="url(#floorG)"/>

<!-- ════════════════════════════════════════════════════ -->
