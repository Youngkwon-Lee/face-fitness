    <path d="M 240,80 C 255,55 290,48 340,62 C 380,74 410,82 430,86" stroke-width="1.2"/>
    <path d="M 245,76 C 262,50 298,43 348,57 C 390,70 418,78 438,83" stroke-width="1.0"/>
    <path d="M 250,73 C 268,47 304,40 355,54 C 397,67 424,75 442,80" stroke-width="0.8"/>
    <path d="M 255,70 C 272,46 310,38 360,52 C 402,65 430,74 448,78" stroke-width="0.7"/>
    <path d="M 210,92 C 225,68 255,56 305,58 C 345,60 380,68 420,80" stroke-width="1.1"/>
    <path d="M 200,105 C 218,78 248,65 298,67 C 338,69 375,75 415,87" stroke-width="1.0"/>
    <path d="M 195,118 C 214,90 242,77 292,79 C 332,81 368,88 408,98" stroke-width="0.9"/>
    <path d="M 192,128 C 210,100 238,87 286,88 C 326,89 362,96 400,108" stroke-width="0.8"/>
    <path d="M 190,138 C 208,112 234,98 282,99 C 320,100 358,106 395,118" stroke-width="0.7"/>
    <path d="M 265,67 C 278,44 312,36 365,49 C 408,62 436,72 452,76" stroke-width="0.6"/>
    <path d="M 270,65 C 284,42 318,34 370,47 C 414,60 440,70 455,74" stroke-width="0.5"/>
    <path d="M 188,152 C 205,130 228,116 272,116 C 308,116 342,122 378,133" stroke-width="0.6"/>
    <path d="M 188,164 C 204,142 225,128 268,128 C 304,128 336,134 370,144" stroke-width="0.5"/>
  </g>

  <!-- Neck and shoulders -->
  <g stroke="#e0d7ff" stroke-width="1.4" fill="none" opacity="0.7">
    <line x1="248" y1="395" x2="230" y2="470"/>
    <line x1="312" y1="395" x2="330" y2="470"/>
    <path d="M 230,470 C 210,478 170,492 100,508 C 60,518 30,520 10,520" stroke-width="1.2"/>
    <path d="M 330,470 C 350,478 390,492 460,508 C 500,518 530,520 550,520" stroke-width="1.2"/>
  </g>

  <!-- Face outline glow pass -->
  <ellipse cx="280" cy="255" rx="138" ry="168" fill="none"
    stroke="#a78bfa" stroke-width="4" opacity="0.25" filter="url(#softGlow)"/>
  <!-- Face outline main line -->
  <ellipse cx="280" cy="255" rx="136" ry="166" fill="none"
    stroke="#ddd6fe" stroke-width="1.6" opacity="0.9" filter="url(#faceGlow)"/>

  <!-- Left eyebrow -->
  <g stroke="#c4b5fd" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M 210,182 C 220,174 234,170 252,172" stroke-width="1.8"/>
    <path d="M 211,185 C 221,177 235,173 252,175" stroke-width="1.2"/>
    <path d="M 212,188 C 222,180 236,176 252,178" stroke-width="0.8"/>
    <path d="M 213,191 C 222,183 236,179 251,181" stroke-width="0.5"/>
  </g>
  <!-- Right eyebrow -->
  <g stroke="#c4b5fd" fill="none" stroke-linecap="round" opacity="0.9">
