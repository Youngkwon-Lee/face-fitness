  <!-- Center vertical dashed line -->
  <line x1="280" y1="46" x2="280" y2="514"
    stroke="#6366f1" stroke-width="0.8" stroke-dasharray="4 10" opacity="0.45"/>

  <!-- Scan sweep animation -->
  <line x1="280" y1="265" x2="500" y2="265"
    stroke="url(#ringGrad)" stroke-width="1.5" opacity="0">
    <animate attributeName="opacity" values="0;0.6;0" dur="4s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate"
      from="0 280 265" to="360 280 265" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- HUD labels -->
  <g font-family="'SF Mono','Fira Code',monospace" fill="#818cf8" opacity="0.55">
    <text x="34" y="200" font-size="8" letter-spacing="1">L</text>
    <text x="524" y="200" font-size="8" letter-spacing="1">R</text>
  </g>
  <g font-family="monospace" font-size="7" fill="#4f46e5" opacity="0.4" letter-spacing="0.5">
    <text x="18" y="530">SCAN</text>
    <text x="490" y="530">ALIGN</text>
    <text x="18" y="32">CAM</text>
    <text x="487" y="32">READY</text>
  </g>
</svg>
