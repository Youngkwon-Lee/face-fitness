<!-- ════════════════════════════════════════════════════ -->
<!--   SCAN RING (pink/magenta dashed oval)               -->
<!-- ════════════════════════════════════════════════════ -->

<!-- Outer scan ring glow -->
<ellipse cx="280" cy="212" rx="170" ry="198" fill="none"
  stroke="#ec4899" stroke-width="5" stroke-dasharray="14 7"
  filter="url(#gPink)" opacity="0.45"/>
<!-- Outer scan ring sharp -->
<ellipse cx="280" cy="212" rx="170" ry="198" fill="none"
  stroke="#f472b6" stroke-width="1.6" stroke-dasharray="14 7" opacity="0.88">
  <animateTransform attributeName="transform" type="rotate"
    from="0 280 212" to="360 280 212" dur="18s" repeatCount="indefinite"/>
</ellipse>

<!-- Inner scan ring (faint) -->
<ellipse cx="280" cy="212" rx="154" ry="180" fill="none"
  stroke="#f9a8d4" stroke-width="0.8" stroke-dasharray="5 12" opacity="0.35"/>

