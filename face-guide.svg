<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="60%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#111a4a"/>
      <stop offset="100%" stop-color="#070c24"/>
    </radialGradient>
    <filter id="faceGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="eyeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="blur1"/>
      <feComposite in="SourceGraphic" in2="blur1" operator="over"/>
    </filter>
    <radialGradient id="irisL" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <radialGradient id="irisR" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="80%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </radialGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#818cf8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="560" height="560" fill="url(#bgGrad)"/>

  <!-- Faint background grid -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="0.5">
    <line x1="0" y1="140" x2="560" y2="140"/>
    <line x1="0" y1="280" x2="560" y2="280"/>
    <line x1="0" y1="420" x2="560" y2="420"/>
    <line x1="140" y1="0" x2="140" y2="560"/>
    <line x1="280" y1="0" x2="280" y2="560"/>
    <line x1="420" y1="0" x2="420" y2="560"/>
  </g>

  <!-- Outer HUD dashed circle -->
  <circle cx="280" cy="265" r="220" fill="none" stroke="#4f46e5" stroke-width="1"
    stroke-dasharray="6 8" stroke-opacity="0.55">
    <animateTransform attributeName="transform" type="rotate"
      from="0 280 265" to="360 280 265" dur="30s" repeatCount="indefinite"/>
  </circle>

  <!-- Tick marks -->
  <g stroke="#a5b4fc" stroke-width="1.5" opacity="0.7">
    <line x1="42" y1="218" x2="56" y2="218"/>
    <line x1="504" y1="218" x2="518" y2="218"/>
    <line x1="280" y1="44" x2="280" y2="58"/>
    <line x1="280" y1="472" x2="280" y2="486"/>
  </g>

  <!-- Corner accent marks -->
  <g stroke="#818cf8" stroke-width="1" opacity="0.5">
    <line x1="124" y1="96" x2="134" y2="106"/>
    <line x1="436" y1="96" x2="426" y2="106"/>
    <line x1="124" y1="434" x2="134" y2="424"/>
    <line x1="436" y1="434" x2="426" y2="424"/>
  </g>

  <!-- Hair — swept right -->
